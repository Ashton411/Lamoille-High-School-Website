            </div>
            {schedule.updatedAt && <div style={{fontSize:'11px',color:'var(--text3)'}}>Last updated {fmtDate(schedule.updatedAt)}</div>}
          </div>
          <ScheduleView blocks={schedule.blocks||[]} courses={courses} userId={profile.id} bellSchedule={bellSchedule}/>
        </div>
      )}
    </div>
  );
}

// ── Schedule View (read-only grid) ──
function ScheduleView({ blocks, courses, userId, bellSchedule }) {
  const bells = bellSchedule || BELL_SCHEDULE;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'.4rem'}}>
      {bells.map(bell => {
        const block = blocks.find(b=>b.period===bell.period);
        const course = block?.courseId ? courses.find(c=>c.id===block.courseId) : null;
        // Auto-match by period — instructors see their actual course
        const autoCourse = !course && block?.type==='teaching'
          ? courses.find(c=>c.period===bell.period && (c.teacherIds||[]).includes(userId))
          : null;
        const displayCourse = course || autoCourse;
        const bt = BLOCK_TYPES.find(t=>t.type===(block?.type||'free'));
        return (
          <div key={bell.period} style={{
            display:'grid',gridTemplateColumns:'150px 1fr 180px',
            background:'var(--white)',border:'1px solid var(--border)',
            borderLeft:`4px solid ${block?(bt?.color||bell.color||'#888'):'#e5e7eb'}`,
            borderRadius:'var(--radius)',overflow:'hidden',
            opacity: block ? 1 : 0.5,
          }}>
            <div style={{padding:'.6rem .85rem',borderRight:'1px solid var(--border)',background:bell.type==='break'?'#f9fafb':'var(--white)'}}>
              <div style={{fontSize:'12px',fontWeight:600,color:'var(--navy)'}}>{bell.period}</div>
              <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}}>⏰ {bell.realStart}–{bell.realEnd}</div>
              <div style={{fontSize:'10px',color:'var(--text3)'}}>🎮 {bell.gameStart}–{bell.gameEnd}</div>
            </div>
            <div style={{padding:'.6rem 1rem',display:'flex',alignItems:'center',gap:'.6rem'}}>
              {block ? (
                <>
                  <span style={{fontSize:'16px'}}>{bt?.icon||'📌'}</span>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:600,color:'var(--navy)'}}>
                      {displayCourse ? displayCourse.name : (block.label||bt?.label||'Activity')}
                    </div>
                    {displayCourse && (
                      <div style={{display:'flex',gap:'.3rem',marginTop:'2px',flexWrap:'wrap'}}>
                        {(displayCourse.grades||[]).sort().map(g=>(
                          <span key={g} style={{fontSize:'10px',fontWeight:600,padding:'1px 6px',borderRadius:10,background:'#e8eeff',color:'#1a3470'}}>Grade {g}</span>
                        ))}
                        <span style={{fontSize:'10px',color:'var(--text3)',textTransform:'capitalize'}}>{displayCourse.type}</span>
                      </div>
                    )}
                    {!displayCourse && block.notes && <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'1px',fontStyle:'italic'}}>{block.notes}</div>}
                  </div>
                </>
              ) : (
                <span style={{fontSize:'12px',color:'var(--text3)'}}>— Unassigned —</span>
              )}
            </div>
            <div style={{padding:'.6rem .85rem',display:'flex',alignItems:'center',justifyContent:'flex-end',borderLeft:'1px solid var(--border)'}}>
              {block && <span style={{fontSize:'11px',fontWeight:600,padding:'3px 10px',borderRadius:20,background:`${bt?.color||'#888'}18`,color:bt?.color||'#888',border:`1px solid ${bt?.color||'#888'}33`}}>{bt?.label||block.type}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Schedule Builder (HR only, drag-and-drop) ──
function ScheduleBuilder({ profile }) {
  const [users, setUsers]         = useState([]);
  const [ranks, setRanks]         = useState([]);
  const [courses, setCourses]     = useState([]);
  const [bellSchedule, setBellSchedule] = useState(BELL_SCHEDULE);
  const [selectedUser, setSelectedUser] = useState(null);
  const [blocks, setBlocks]       = useState({});
  const [scheduleName, setScheduleName] = useState('Daily Schedule');
  const [scheduleNotes, setScheduleNotes] = useState('');
  const [saving, setSaving]       = useState(false);
  const [saved, setSaved]         = useState(false);
  const [dragItem, setDragItem]   = useState(null);
  const [dragOver, setDragOver]   = useState(null);
  const [search, setSearch]       = useState('');
  const [autoBuilding, setAutoBuilding] = useState(false);

  // Load everything — including live bell schedule from Firestore
  useEffect(() => {
    const unsubUsers = db.collection('users').onSnapshot(s => {
      setUsers(s.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.status==='active'));
    });
    db.collection('ranks').get().then(s => {
      const docs = s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));
      setRanks(docs);
    });
    // Live courses — react to changes
    const unsubCourses = db.collection('courses').onSnapshot(s => {
      setCourses(s.docs.map(d=>({id:d.id,...d.data()})));
    });
    // Live bell schedule from Firestore
    const unsubBell = db.collection('settings').doc('bell_schedule').onSnapshot(doc => {
      if (doc.exists && doc.data().periods?.length) {
        setBellSchedule(doc.data().periods);
      } else {
        setBellSchedule(BELL_SCHEDULE);
      }
    });
    return () => { unsubUsers(); unsubCourses(); unsubBell(); };
  }, []);

  const loadUserSchedule = async (user) => {
    setSelectedUser(user);
    const doc = await db.collection('schedules').doc(user.id).get();
    if (doc.exists) {
      const data = doc.data();
      const map = {};
      (data.blocks||[]).forEach(b => { map[b.period] = b; });
      setBlocks(map);
      setScheduleName(data.name || 'Daily Schedule');
      setScheduleNotes(data.notes || '');
    } else {
      setBlocks({});
      setScheduleName('Daily Schedule');
      setScheduleNotes('');
    }
    setSaved(false);
  };

  // ── AUTO-BUILD SCHEDULE ──
  // Builds a full schedule from this user's assigned courses + sensible defaults
  const autoBuildSchedule = () => {
    if (!selectedUser) return;
    setAutoBuilding(true);

    const userCourses = courses.filter(c => (c.teacherIds||[]).includes(selectedUser.id));
    const isInstructor = userCourses.length > 0;

    const isNonTeachingBell = (name) => {
      const n = name.toLowerCase().trim();
      return n==='homeroom'||n.startsWith('lunch')||n.startsWith('after school')||n==='break'||n==='recess'||n==='advisory'||n==='study hall';
    };
    const map = {};

    bellSchedule.forEach(bell => {
      const isBreak = bell.type === 'break';
      const isLunch = bell.period.toLowerCase().includes('lunch');
      const isHomeroom = bell.period.toLowerCase().includes('homeroom');
      const isAfterSchool = bell.period.toLowerCase().includes('after');
      const isNonTeaching = isBreak || isNonTeachingBell(bell.period);

      if (isNonTeaching) {
        map[bell.period] = {
          period: bell.period,
          type: isLunch ? 'lunch' : isHomeroom ? 'duty' : 'free',
          label: isLunch ? 'Lunch' : isHomeroom ? 'Homeroom' : isAfterSchool ? 'After School' : bell.period,
          color: isLunch ? '#f59e0b' : isHomeroom ? '#6b7280' : '#d1d5db',
          notes: '',
          courseId: '',
        };
        return;
      }

      if (isInstructor) {
        // Find a course assigned to this period
        const course = userCourses.find(c => c.period === bell.period);
        if (course) {
          map[bell.period] = {
            period: bell.period,
            type: 'teaching',
            label: course.name,
            color: '#3b82f6',
            notes: (course.grades||[]).length > 0 ? `Grade ${course.grades.sort().join('/')}` : '',
            courseId: course.id,
          };
        } else {
          // No course this period — planning
          map[bell.period] = {
            period: bell.period,
            type: 'planning',
            label: 'Planning Period',
            color: '#10b981',
            notes: '',
            courseId: '',
          };
        }
      } else {
        // Non-instructor — use rank-based default
        const rankName = (selectedUser.rankName||'').toLowerCase();
        let type = 'office', label = 'Office Duties', color = '#1D9E75';
        if (rankName.includes('principal') || rankName.includes('dean') || rankName.includes('director') || rankName.includes('admin')) {
          type = 'admin'; label = 'Administrative'; color = '#0B1F4A';
        } else if (rankName.includes('counselor')) {
          type = 'counseling'; label = 'Student Sessions'; color = '#3b82f6';
        } else if (rankName.includes('officer') || rankName.includes('sro')) {
          type = 'patrol'; label = 'Campus Patrol'; color = '#1a3470';
        }
        map[bell.period] = { period: bell.period, type, label, color, notes: '', courseId: '' };
      }
    });

    setBlocks(map);
    const courseSummary = userCourses.length > 0 ? `${userCourses.length} course${userCourses.length!==1?'s':''}` : selectedUser.rankName||'Staff';
    setScheduleName(`${selectedUser.rpName||selectedUser.displayName} — Daily Schedule`);
    setScheduleNotes(isInstructor ? `Auto-generated · ${courseSummary} assigned` : 'Auto-generated from role');
    setAutoBuilding(false);
    setSaved(false);
  };

  const applyTemplate = (templateKey) => {
    const tpl = SCHEDULE_TEMPLATES[templateKey];
    if (!tpl) return;
    const map = {};
    tpl.blocks.forEach(b => { map[b.period] = {...b}; });
    setBlocks(map);
    setScheduleName(tpl.name + ' Schedule');
    setSaved(false);
  };

  // ── Drag handlers ──
  const onDragStartPalette = (blockType) => setDragItem({ source:'palette', blockType });
  const onDragStartBlock   = (period)    => setDragItem({ source:'block', period });
  const onDragOver         = (e, period) => { e.preventDefault(); setDragOver(period); };

  const onDrop = (e, targetPeriod) => {
    e.preventDefault();
    setDragOver(null);
    if (!dragItem) return;
    if (dragItem.source === 'palette') {
      const bt = BLOCK_TYPES.find(t => t.type === dragItem.blockType);
      setBlocks(b => ({...b, [targetPeriod]: {
        period: targetPeriod, type: dragItem.blockType,
        label: bt?.label || dragItem.blockType, color: bt?.color || '#888',
        notes: '', courseId: '',
      }}));
    } else {
      const moving = blocks[dragItem.period];
      if (!moving) return;
      setBlocks(b => {
        const next = {...b};
        delete next[dragItem.period];
        next[targetPeriod] = {...moving, period: targetPeriod};
        return next;
      });
    }
    setDragItem(null);
    setSaved(false);
  };

  const onDropTrash = (e) => {
    e.preventDefault();
    if (dragItem?.source === 'block') {
      setBlocks(b => { const next={...b}; delete next[dragItem.period]; return next; });
    }
    setDragItem(null); setDragOver(null);
  };

  const saveSchedule = async () => {
    if (!selectedUser) return;
    setSaving(true);
    const blockArr = Object.values(blocks);
    await db.collection('schedules').doc(selectedUser.id).set({
      userId: selectedUser.id,
      userName: selectedUser.displayName,
      name: scheduleName,
      notes: scheduleNotes,
      blocks: blockArr,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: profile.displayName,
    });
    await addLog(profile.id, profile.displayName, 'Updated schedule', selectedUser.displayName);
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const filteredUsers = users
    .filter(u => (u.displayName||'').toLowerCase().includes(search.toLowerCase()) || (u.rpName||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => {
      const aR=ranks.find(r=>r.id===a.rankId), bR=ranks.find(r=>r.id===b.rankId);
      const ao=aR?(aR.sortOrder??aR.tier??999):999, bo=bR?(bR.sortOrder??bR.tier??999):999;
      return ao!==bo ? ao-bo : (a.displayName||'').localeCompare(b.displayName||'');
    });

  const userCourses = selectedUser ? courses.filter(c=>(c.teacherIds||[]).includes(selectedUser.id)) : [];

  return (
    <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:'1.25rem',alignItems:'start'}}>

      {/* ── Left panel ── */}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem',position:'sticky',top:'1rem'}}>

        {/* Staff picker */}
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Select Staff</div></div>
          <div style={{padding:'.6rem .85rem',borderBottom:'1px solid var(--border)'}}>
            <input className="search-input" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:'100%'}}/>
          </div>
          <div style={{maxHeight:240,overflowY:'auto'}}>
            {filteredUsers.map(u => {
              const rank = ranks.find(r=>r.id===u.rankId);
              const hasCourses = courses.filter(c=>(c.teacherIds||[]).includes(u.id)).length > 0;
              return (
                <div key={u.id} onClick={()=>loadUserSchedule(u)} style={{
                  padding:'.5rem .85rem',cursor:'pointer',display:'flex',alignItems:'center',gap:'.6rem',
                  background:selectedUser?.id===u.id?'var(--navy)':'transparent',
                  borderBottom:'1px solid var(--border)',transition:'background .1s',
                }}>
                  <div className="avatar" style={{width:26,height:26,fontSize:10,flexShrink:0,background:selectedUser?.id===u.id?'rgba(255,255,255,.2)':undefined}}>{(u.displayName||'?')[0].toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'12.5px',fontWeight:500,color:selectedUser?.id===u.id?'white':'var(--navy)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.rpName||u.displayName}</div>
                    <div style={{fontSize:'10.5px',color:selectedUser?.id===u.id?'rgba(255,255,255,.5)':'var(--text3)'}}>{rank?.name||'Unranked'}{hasCourses?' · 📚 Instructor':''}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Block palette */}
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Block Types</div><div className="panel-subtitle">Drag onto schedule</div></div>
          <div style={{padding:'.6rem'}}>
            {BLOCK_TYPES.map(bt=>(
              <div key={bt.type} draggable onDragStart={()=>onDragStartPalette(bt.type)}
                style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.4rem .6rem',borderRadius:7,marginBottom:3,background:`${bt.color}12`,border:`1px solid ${bt.color}30`,cursor:'grab',userSelect:'none'}}>
                <span style={{fontSize:'14px'}}>{bt.icon}</span>
                <span style={{fontSize:'12px',fontWeight:500,color:bt.color}}>{bt.label}</span>
                <span style={{marginLeft:'auto',fontSize:'10px',color:'var(--text3)'}}>⠿</span>
              </div>
            ))}
          </div>
        </div>

        {/* Templates */}
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Templates</div></div>
          <div style={{padding:'.6rem',display:'flex',flexDirection:'column',gap:'.3rem'}}>
            {Object.entries(SCHEDULE_TEMPLATES).map(([key,tpl])=>(
              <button key={key} className="btn btn-ghost btn-sm" onClick={()=>applyTemplate(key)} style={{justifyContent:'flex-start',fontSize:'12px'}}>
                📋 {tpl.name}
              </button>
            ))}
          </div>
        </div>

        {/* Trash */}
        <div
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.background='#fee2e2';e.currentTarget.style.borderColor='#ef4444';}}
          onDragLeave={e=>{e.currentTarget.style.background='';e.currentTarget.style.borderColor='';}}
          onDrop={e=>{e.currentTarget.style.background='';e.currentTarget.style.borderColor='';onDropTrash(e);}}
          style={{border:'2px dashed #fca5a5',borderRadius:'var(--radius)',padding:'1rem',textAlign:'center',color:'#ef4444',fontSize:'12px',transition:'all .15s'}}
        >
          🗑️ Drop here to remove
        </div>
      </div>

      {/* ── Right: Schedule grid ── */}
      <div>
        {!selectedUser ? (
          <div className="panel">
            <div className="empty"><span className="empty-icon">👤</span><div className="empty-text">Select a staff member</div><div className="empty-sub">Choose someone from the left to build their schedule</div></div>
          </div>
        ) : (
          <div className="panel">
            {/* Header */}
            <div className="panel-header" style={{flexWrap:'wrap',gap:'.75rem'}}>
              <div style={{flex:1,minWidth:180}}>
                <input value={scheduleName} onChange={e=>{setScheduleName(e.target.value);setSaved(false);}}
                  style={{fontFamily:"'Playfair Display',serif",fontSize:'17px',fontWeight:600,color:'var(--navy)',background:'transparent',border:'none',outline:'none',width:'100%',padding:0}}
                  placeholder="Schedule name..."/>
                <div style={{fontSize:'12px',color:'var(--text3)',marginTop:'1px'}}>
                  {selectedUser.rpName||selectedUser.displayName}
                  {userCourses.length>0 && <span style={{marginLeft:'.5rem',color:'var(--teal)'}}>· 📚 {userCourses.length} course{userCourses.length!==1?'s':''} assigned</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:'.4rem',alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
                {saved && <span style={{fontSize:'12px',color:'var(--teal)',fontWeight:500}}>✓ Saved</span>}
                {/* Auto-build button — prominent when user has courses */}
                <button
                  className="btn btn-sm"
                  style={{background:userCourses.length>0?'var(--teal)':'var(--bg)',color:userCourses.length>0?'white':'var(--text2)',border:`1px solid ${userCourses.length>0?'var(--teal)':'var(--border)'}`,fontWeight:600}}
                  onClick={autoBuildSchedule}
                  disabled={autoBuilding}
                  title={userCourses.length>0?'Build schedule from assigned courses':'Build schedule from role'}
                >
                  {autoBuilding ? <div className="spinner"/> : `⚡ Auto-build${userCourses.length>0?' from courses':''}`}
                </button>
                <button className="btn btn-primary btn-sm" onClick={saveSchedule} disabled={saving}>
                  {saving ? <div className="spinner"/> : 'Save'}
                </button>
              </div>
            </div>

            {/* Notes */}
            <div style={{padding:'.4rem 1.5rem',borderBottom:'1px solid var(--border)'}}>
              <input className="form-input" value={scheduleNotes} onChange={e=>{setScheduleNotes(e.target.value);setSaved(false);}} placeholder="Notes..." style={{fontSize:'12px'}}/>
            </div>

            {/* Auto-build hint */}
            {userCourses.length > 0 && Object.keys(blocks).length === 0 && (
              <div style={{margin:'1rem',background:'linear-gradient(135deg,#f0fdf8,#e8f9f3)',border:'1px solid #9fe1cb',borderRadius:10,padding:'1rem 1.25rem',display:'flex',alignItems:'center',gap:'1rem'}}>
                <span style={{fontSize:'24px'}}>⚡</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:'13px',color:'#0a5c45'}}>This instructor has {userCourses.length} course{userCourses.length!==1?'s':''} assigned</div>
                  <div style={{fontSize:'12px',color:'#0f6e56',marginTop:'2px'}}>{userCourses.map(c=>`${c.name}${c.period?' ('+c.period+')':''}`).join(' · ')}</div>
                </div>
                <button className="btn btn-sm" style={{background:'var(--teal)',color:'white',border:'none',fontWeight:600,flexShrink:0}} onClick={autoBuildSchedule}>
                  Auto-build schedule →
                </button>
              </div>
            )}

            {/* Period rows */}
            <div style={{padding:'1rem'}}>
              {bellSchedule.map(bell => {
                const block = blocks[bell.period];
                const bt = BLOCK_TYPES.find(t=>t.type===(block?.type||'free'));
                const isOver = dragOver === bell.period;
                const course = block?.courseId ? courses.find(c=>c.id===block.courseId) : null;
                const autoCourse = !course && block?.type==='teaching'
                  ? courses.find(c=>c.period===bell.period && (c.teacherIds||[]).includes(selectedUser.id))
                  : null;
                const displayCourse = course || autoCourse;

                return (
                  <div key={bell.period}
                    onDragOver={e=>onDragOver(e,bell.period)}
                    onDragLeave={()=>setDragOver(null)}
                    onDrop={e=>onDrop(e,bell.period)}
                    style={{
                      display:'grid',gridTemplateColumns:'130px 1fr 130px',
                      marginBottom:'.4rem',
                      border:`2px ${isOver?'dashed':'solid'} ${isOver?'var(--teal)':block?`${bt?.color||'#888'}40`:'var(--border)'}`,
                      borderLeft:`4px solid ${block?(bt?.color||'#888'):'#e5e7eb'}`,
                      borderRadius:'var(--radius-sm)',
                      background:isOver?'rgba(29,158,117,.05)':block?`${bt?.color||'#888'}06`:'var(--white)',
                      overflow:'hidden',transition:'all .12s',minHeight:52,
                    }}
                  >
                    {/* Bell info */}
                    <div style={{padding:'.45rem .7rem',borderRight:'1px solid var(--border)',background:bell.type==='break'?'#f9fafb':'transparent',flexShrink:0}}>
                      <div style={{fontSize:'11px',fontWeight:600,color:'var(--navy)'}}>{bell.period}</div>
                      <div style={{fontSize:'9.5px',color:'var(--text3)',marginTop:'1px'}}>⏰ {bell.realStart}–{bell.realEnd}</div>
                      <div style={{fontSize:'9.5px',color:'var(--text3)'}}>🎮 {bell.gameStart}–{bell.gameEnd}</div>
                    </div>

                    {/* Block */}
                    <div style={{padding:'.45rem .7rem',display:'flex',alignItems:'center',gap:'.6rem',minWidth:0}}>
                      {block ? (
                        <div draggable onDragStart={()=>onDragStartBlock(bell.period)} style={{display:'flex',alignItems:'center',gap:'.6rem',width:'100%',cursor:'grab'}}>
                          <span style={{fontSize:'15px',flexShrink:0}}>{bt?.icon||'📌'}</span>
                          <div style={{flex:1,minWidth:0}}>
                            {/* Show course name for teaching blocks, editable label otherwise */}
                            {block.type==='teaching' && displayCourse ? (
                              <div>
                                <div style={{fontWeight:600,fontSize:'12.5px',color:'var(--navy)'}}>{displayCourse.name}</div>
                                <div style={{display:'flex',gap:'.25rem',marginTop:'2px',flexWrap:'wrap'}}>
                                  {(displayCourse.grades||[]).sort().map(g=>(
                                    <span key={g} style={{fontSize:'9.5px',fontWeight:600,padding:'1px 5px',borderRadius:8,background:'#e8eeff',color:'#1a3470'}}>Gr {g}</span>
                                  ))}
                                </div>
                              </div>
                            ) : (
                              <input value={block.label||''} onChange={e=>{setSaved(false);setBlocks(b=>({...b,[bell.period]:{...b[bell.period],label:e.target.value}}));}} onClick={e=>e.stopPropagation()}
                                style={{fontWeight:600,fontSize:'12.5px',color:'var(--navy)',background:'transparent',border:'none',outline:'none',width:'100%',padding:0,cursor:'text'}}/>
                            )}
                            {/* Course picker for teaching blocks */}
                            {block.type==='teaching' && userCourses.length>0 && !displayCourse && (
                              <select value={block.courseId||''} onChange={e=>{setSaved(false);setBlocks(b=>({...b,[bell.period]:{...b[bell.period],courseId:e.target.value}}));}} onClick={e=>e.stopPropagation()}
                                style={{fontSize:'11px',color:'var(--teal)',background:'transparent',border:'none',outline:'none',cursor:'pointer',maxWidth:170,marginTop:'1px'}}>
                                <option value=''>— Assign course —</option>
                                {userCourses.map(c=><option key={c.id} value={c.id}>{c.name}{c.period?' ('+c.period+')':''}</option>)}
                              </select>
                            )}
                          </div>
                        </div>
                      ) : (
                        <span style={{fontSize:'11.5px',color:isOver?'var(--teal)':'var(--text3)',fontStyle:'italic'}}>
                          {isOver?'Drop here':'Drag a block type here...'}
                        </span>
                      )}
                    </div>

                    {/* Notes */}
                    <div style={{padding:'.45rem .7rem',borderLeft:'1px solid var(--border)',display:'flex',alignItems:'center'}}>
                      {block && (
                        <input value={block.notes||''} onChange={e=>{setSaved(false);setBlocks(b=>({...b,[bell.period]:{...b[bell.period],notes:e.target.value}}));}}
                          placeholder="Notes..." style={{fontSize:'11px',color:'var(--text3)',background:'transparent',border:'none',outline:'none',width:'100%'}}/>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Preview */}
            <div style={{padding:'1rem',borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>Staff Preview</div>
              <ScheduleView blocks={Object.values(blocks)} courses={courses} userId={selectedUser.id} bellSchedule={bellSchedule}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// GRADE INFERENCE — knows real HS curriculum
// ═══════════════════════════════════════════════════════
function inferGrades(name) {
  const t = (name||'').toLowerCase();
  // Explicit numbers
  if (/\b9(th)?\b/.test(t))  return ['9'];
  if (/\b10(th)?\b/.test(t)) return ['10'];
  if (/\b11(th)?\b/.test(t)) return ['11'];
  if (/\b12(th)?\b/.test(t)) return ['12'];
  if (/freshman/.test(t))    return ['9'];
  if (/sophomore/.test(t))   return ['10'];
  if (/junior/.test(t))      return ['11'];
  if (/senior/.test(t))      return ['12'];
  // AP/Advanced/Honors
  if (/\bap\b|advanced placement/.test(t)) return ['11','12'];
  if (/\bhonor/.test(t))                   return ['10','11','12'];
  // English sequence
  if (/english\s*9|lang.*arts.*9/.test(t)) return ['9'];
  if (/english\s*10/.test(t))              return ['10'];
  if (/english\s*11|american lit/.test(t)) return ['11'];
  if (/english\s*12|brit.*lit|senior eng/.test(t)) return ['12'];
  if (/creative writ|speech|debate|journalism/.test(t)) return ['10','11','12'];
  // Math sequence
  if (/pre.?algebra/.test(t))              return ['9'];
  if (/algebra\s*1/.test(t))              return ['9','10'];
  if (/geometry/.test(t))                 return ['10'];
  if (/algebra\s*2/.test(t))             return ['10','11'];
  if (/pre.?calc/.test(t))               return ['11','12'];
  if (/calculus|calc\b/.test(t))         return ['11','12'];
  if (/statistics|stats/.test(t))        return ['11','12'];
  if (/personal finance|financial math/.test(t)) return ['12'];
  // Science
  if (/earth sci|physical sci|science\s*9/.test(t)) return ['9'];
  if (/\bbiology\b|\bbio\b/.test(t))     return ['9','10'];
  if (/chemistry|chem\b/.test(t))        return ['10','11'];
  if (/\bphysics\b/.test(t))             return ['11','12'];
  if (/anatomy|physiology/.test(t))      return ['11','12'];
  if (/health sci/.test(t))              return ['10','11','12'];
  if (/\bhealth\b/.test(t))             return ['9','10'];
  // Social Studies
  if (/world hist|world geo/.test(t))    return ['9'];
  if (/modern world/.test(t))            return ['10'];
  if (/us hist|u\.s\. hist|american hist|united states hist/.test(t)) return ['10','11'];
  if (/government|civics/.test(t))       return ['11','12'];
  if (/economics|\becon\b/.test(t))      return ['11','12'];
  if (/psychology|sociology/.test(t))    return ['11','12'];
  // Languages
  if (/spanish\s*1|french\s*1|latin\s*1/.test(t)) return ['9','10'];
  if (/spanish\s*2|french\s*2|latin\s*2/.test(t)) return ['10','11'];
  if (/spanish\s*3|french\s*3|latin\s*3/.test(t)) return ['11','12'];
  if (/\bspanish\b|\bfrench\b|\blatin\b|\bgerman\b/.test(t)) return ['9','10','11','12'];
  // PE/Arts/Electives
  if (/phys.*ed|p\.e\.|gym/.test(t))    return ['9','10','11','12'];
  if (/\bart\s*1/.test(t))              return ['9','10'];
  if (/\bart\s*[234]/.test(t))          return ['11','12'];
  if (/photography|drama|theatre|band|choir|orchestra/.test(t)) return ['9','10','11','12'];
  if (/culinary|cooking/.test(t))       return ['10','11','12'];
  if (/finance\b/.test(t))              return ['11','12'];
  if (/computer sci|coding|programming/.test(t)) return ['9','10','11','12'];
  return []; // unknown — caller handles fallback
}

// ═══════════════════════════════════════════════════════
// AUTO-SCHEDULER
// Grid model: periods × grades, one course per cell
// Each course gets ONE cell (one period + one grade)
// ═══════════════════════════════════════════════════════
function autoSchedule(courses, periods) {
  const GRADES = ['9','10','11','12'];

  // Every course can go in any grade column and any period
  // Only constraints: no teacher teaches two classes at the same time
  //                   spread evenly across grades and periods
  const gradeLoad  = {}; GRADES.forEach(g => gradeLoad[g] = 0);
  const teacherSlot = {};
  const periodLoad  = {}; periods.forEach(p => periodLoad[p] = 0);
  const assigned    = [];
  const conflicts   = [];

  function place(i) {
    if (i === courses.length) return true;
    const c = courses[i];

    // Build all valid (period, grade) options
    const opts = [];
    for (const p of periods) {
      if ((c.teacherIds||[]).some(tid => teacherSlot[tid]?.[p])) continue;
      for (const g of GRADES) {
        opts.push({p, g});
      }
    }

    if (opts.length === 0) { conflicts.push(c.name); return place(i+1); }

    // Prefer: least-loaded period first, then least-loaded grade
    opts.sort((a,b) => {
      const pd = periodLoad[a.p] - periodLoad[b.p];
      if (pd !== 0) return pd;
      return gradeLoad[a.g] - gradeLoad[b.g];
    });

    for (const {p, g} of opts) {
      (c.teacherIds||[]).forEach(tid => { if (!teacherSlot[tid]) teacherSlot[tid] = {}; teacherSlot[tid][p] = true; });
      periodLoad[p]++; gradeLoad[g]++;
      assigned.push({...c, period: p, grades: [g]});
      if (place(i+1)) return true;
      assigned.pop();
      (c.teacherIds||[]).forEach(tid => { if (teacherSlot[tid]) delete teacherSlot[tid][p]; });
      periodLoad[p]--; gradeLoad[g]--;
    }

    conflicts.push(c.name); return place(i+1);
  }

  place(0);
  const assignedNames = new Set(assigned.map(c=>c.name));
  return { assigned, conflicts: [...new Set(conflicts)].filter(n=>!assignedNames.has(n)) };
}

// ══════════════════════════════════════════════════════

  // Electives (2 slots)

  {name:'Culinary Arts',     type:'elective', grades:['10'], dept:'CTE',            slot:'10-elective'},

  // ── 11th Grade (6 classes) ─────────────────────────
  // Core (required)
  {name:'English 11',        type:'core',     grades:['11'], dept:'English',        slot:'11-core'},
  {name:'Algebra 2',         type:'core',     grades:['11'], dept:'Math',           slot:'11-core'},
  {name:'Chemistry',         type:'core',     grades:['11'], dept:'Science',        slot:'11-core'},
  {name:'U.S. Government',   type:'core',     grades:['11'], dept:'Social Studies', slot:'11-core'},
  // Electives (2 slots)
  {name:'Photography',       type:'elective', grades:['11'], dept:'Fine Arts',      slot:'11-elective'},
  {name:'Health Sciences',   type:'elective', grades:['11'], dept:'CTE',            slot:'11-elective'},

  // ── 12th Grade (6 classes) ─────────────────────────
  // Core (required)
  {name:'English 12',        type:'core',     grades:['12'], dept:'English',        slot:'12-core'},
  {name:'Pre-Calculus',      type:'core',     grades:['12'], dept:'Math',           slot:'12-core'},
  {name:'Physics',           type:'core',     grades:['12'], dept:'Science',        slot:'12-core'},
  {name:'Economics',         type:'core',     grades:['12'], dept:'Social Studies', slot:'12-core'},
  // Electives (2 slots)
  {name:'Band',              type:'elective', grades:['12'], dept:'Fine Arts',      slot:'12-elective'},
  {name:'Health Sciences',   type:'elective', grades:['12'], dept:'CTE',            slot:'12-elective'},

];
// Total: 24 courses (6 per grade × 4 grades)
// Repeating electives: Photography (Gr10+11), Band (Gr9+12), Health Sciences (Gr11+12)

function ManageCourses({ profile }) {
  const [tab, setTab]         = useState('grid');
  const [courses, setCourses] = useState([]);
  const [users, setUsers]     = useState([]);
  const [allPeriods, setAllPeriods] = useState([]); // full objects from Firestore
  const [modal, setModal]     = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm]       = useState({name:'',type:'core',teacherIds:[],grades:[],period:'',dept:'',room:''});
  const [saving, setSaving]   = useState(false);
  const [scheduling, setScheduling] = useState(false);
  const [schedResult, setSchedResult] = useState(null);
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [teacherSearch, setTeacherSearch] = useState('');
  const dragRef = useRef(null);
  const dragOverRef = useRef(null);

  // ── Load data ──
  useEffect(() => {
    const u1 = db.collection('courses').onSnapshot(s => {
      const docs = s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??0)-(b.sortOrder??0));
      setCourses(docs);
    });
    const u2 = db.collection('users').onSnapshot(s =>
      setUsers(s.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.status==='active'))
    );
    const u3 = db.collection('settings').doc('bell_schedule').onSnapshot(doc => {
      const raw = doc.exists && doc.data().periods?.length
        ? doc.data().periods
        : BELL_SCHEDULE;
      setAllPeriods(raw);
    });
    return () => { u1(); u2(); u3(); };
  }, []);

  // ── Derived ──
  const NON_TEACH = n => {
    const s = (n||'').toLowerCase().trim();
    return s==='homeroom'||s.startsWith('lunch')||s.startsWith('after school')||s==='break'||s==='recess';
  };

  const teachPeriods = allPeriods.filter(b => !NON_TEACH(b.period||b));
  const teachPeriodNames = teachPeriods.map(b => b.period||b);

  // Build grid: period → grade → [courses]
  const grid = useMemo(() => {
    const g = {};
    allPeriods.forEach(b => {
      const p = b.period||b;
      g[p] = {};
      GRADES_ALL.forEach(gr => g[p][gr] = []);
    });
    courses.filter(c => c.period && c.grades?.length > 0).forEach(c => {
      const p = c.period;
      const gr = c.grades[0]; // grade is always set by drop column
      if (g[p] && g[p][gr] !== undefined) {
        g[p][gr] = [...g[p][gr], c];
      }
    });
    return g;
  }, [courses, allPeriods]);

  const visibleIds = useMemo(() => {
    const s = new Set();
    Object.values(grid).forEach(row =>
      Object.values(row).forEach(arr => (arr||[]).forEach(c => s.add(c.id)))
    );
    return s;
  }, [grid]);

  const unscheduled   = courses.filter(c => !c.period);
  const notVisible    = courses.filter(c => c.period && !visibleIds.has(c.id));

  // ── Course CRUD ──
  const openNew  = () => { setEditing(null); setForm({name:'',type:'core',teacherIds:[],grades:[],period:'',dept:'',room:''}); setTeacherSearch(''); setModal(true); };
  const openEdit = c  => { setEditing(c); setForm({name:c.name,type:c.type||'core',teacherIds:c.teacherIds||[],grades:c.grades||[],period:c.period||'',dept:c.dept||'',room:c.room||''}); setTeacherSearch(''); setModal(true); };
  const toggleT  = uid => setForm(f=>({...f,teacherIds:f.teacherIds.includes(uid)?f.teacherIds.filter(x=>x!==uid):[...f.teacherIds,uid]}));

  const saveCourse = async () => {
    if (!form.name) return;
    setSaving(true);
    const teacherNames = form.teacherIds.map(id=>users.find(u=>u.id===id)?.displayName||'').filter(Boolean);
    if (editing) {
      await db.collection('courses').doc(editing.id).update({...form, teacherNames});
    } else {
      await db.collection('courses').add({...form, teacherNames, sortOrder:courses.length, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    await addLog(profile.id,profile.displayName,editing?'Updated course':'Created course',form.name);
    setModal(false); setSaving(false);
  };

  const deleteCourse = async c => {
    if (!confirm(`Delete "${c.name}"?`)) return;
    await db.collection('courses').doc(c.id).delete();
  };

  // ── Drag-drop: assign course to a cell ──
  const dropOnCell = async (period, grade) => {
    if (!dragging) return;

    const alreadyHere = (grid[period]?.[grade] || []).find(c => c.id === dragging.id);
    if (alreadyHere) { setDragging(null); setDragOver(null); return; } // already in this exact cell

    const alreadyInGrade = (grid[period]?.[grade] || []);
    if (alreadyInGrade.length > 0) {
      if (!confirm(`Grade ${grade} already has "${alreadyInGrade.map(c=>c.name).join(', ')}" in ${period}. Add here too?`)) {
        setDragging(null); setDragOver(null); return;
      }
    }

    // Check if this course already exists somewhere else
    const existsElsewhere = dragging.period && (dragging.period !== period || (dragging.grades||[])[0] !== grade);

    if (existsElsewhere) {
      // CREATE a new doc for this grade/period — keeps original untouched
      await db.collection('courses').add({
        name: dragging.name,
        type: dragging.type || 'core',
        teacherIds: dragging.teacherIds || [],
        teacherNames: dragging.teacherNames || [],
        grades: [grade],
        period,
        sortOrder: dragging.sortOrder ?? courses.length,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else {
      // First placement — just update the existing doc
      await db.collection('courses').doc(dragging.id).update({ period, grades: [grade] });
    }

    setDragging(null); setDragOver(null);
  };

  const removeFromCell = async c => {
    // If this course has duplicates (same name, different grades), just delete this one doc
    const dupes = courses.filter(x => x.name === c.name && x.id !== c.id && x.period);
    if (dupes.length > 0) {
      // This is a duplicate — delete just this copy
      await db.collection('courses').doc(c.id).delete();
    } else {
      // Only copy — just clear period/grade
      await db.collection('courses').doc(c.id).update({ period: '', grades: [] });
    }
  };

  // ── Drag reorder in course list ──
  const onDragStartList = (e,idx) => { dragRef.current=idx; e.currentTarget.style.opacity='.4'; };
  const onDragEnterList = (e,idx) => { dragOverRef.current=idx; };
  const onDragEndList   = async e => {
    e.currentTarget.style.opacity='1';
    if (dragRef.current==null||dragOverRef.current==null||dragRef.current===dragOverRef.current) return;
    const reordered=[...courses];
    const [moved]=reordered.splice(dragRef.current,1);
    reordered.splice(dragOverRef.current,0,moved);
    dragRef.current=null; dragOverRef.current=null;
    const batch=db.batch();
    reordered.forEach((c,i)=>batch.update(db.collection('courses').doc(c.id),{sortOrder:i}));
    await batch.commit();
  };

  // ── Split combined courses ──
  const seedCurriculum = async () => {
    if (!confirm(
      `This will REPLACE all existing courses with the official LHS curriculum.\n\n` +
      `24 courses total — 4 grades × 6 classes each\n` +
      `Each grade: 4 core (required) + 2 electives\n\n` +
      `Teacher assignments and period placements will be cleared.\n\n` +
      `Are you sure?`
    )) return;

    setSaving(true);

    // Delete all existing courses
    const existing = await db.collection('courses').get();
    const delBatch = db.batch();
    existing.docs.forEach(d => delBatch.delete(d.ref));
    await delBatch.commit();

    // Create new curriculum
    const addBatch = db.batch();
    LHS_CURRICULUM.forEach((c, i) => {
      const ref = db.collection('courses').doc();
      addBatch.set(ref, {
        name: c.name,
        type: c.type,
        grades: c.grades,
        dept: c.dept,
        teacherIds: [],
        teacherNames: [],
        period: '',
        sortOrder: i,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    await addBatch.commit();
    await addLog(profile.id, profile.displayName, 'Loaded official LHS curriculum', `${LHS_CURRICULUM.length} courses`);
    setSaving(false);
    alert(`✓ 24 courses loaded (4 grades × 6 classes)!\n\nNext steps:\n1. Assign teachers in Course List\n2. Run Auto-Schedule\n3. Adjust in Schedule Grid`);
  };

  const splitCourse = async c => {
    const dashMatch = c.name.match(/^.+?\s*[—-]\s*(.+)$/);
    const raw = dashMatch ? dashMatch[1] : c.name;
    const parts = raw.split(',').map(s=>s.trim()).filter(Boolean);
    if (parts.length <= 1) { alert(`"${c.name}" doesn't look combined — edit it manually.`); return; }
    if (!confirm(`Split into:\n${parts.map(p=>'• '+p).join('\n')}\n\nOriginal will be deleted.`)) return;
    const batch = db.batch();
    parts.forEach((name,i) => {
      const grades = inferGrades(name);
      batch.set(db.collection('courses').doc(), {
        name, type:c.type||'core', teacherIds:c.teacherIds||[], teacherNames:c.teacherNames||[],
        grades, period:'', sortOrder:(c.sortOrder||0)+i,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    batch.delete(db.collection('courses').doc(c.id));
    await batch.commit();
    await addLog(profile.id,profile.displayName,'Split course',c.name);
  };

  // ── Auto-schedule ──
  const runAutoSchedule = async () => {
    setScheduling(true);
    const result = autoSchedule(courses, teachPeriodNames);
    result.bellPeriods = teachPeriodNames;
    // Write to Firestore
    const batch = db.batch();
    result.assigned.forEach(c => {
      batch.update(db.collection('courses').doc(c.id), { period:c.period, grades:c.grades });
    });
    await batch.commit();
    await addLog(profile.id,profile.displayName,'Auto-scheduled',`${result.assigned.length} courses`);
    setSchedResult(result);
    setScheduling(false);
    setTab('grid');
  };

  // ── Course chip (draggable) ──
  const DEPT_COLORS = {
    'English':'#3b82f6','Math':'#8b5cf6','Science':'#10b981',
    'Social Studies':'#f59e0b','World Language':'#ec4899',
    'PE & Health':'#06b6d4','Fine Arts':'#a855f7','CTE':'#f97316',
  };

  const Chip = ({ c, inCell, grade }) => {
    const displayGrade = grade || c.grades?.[0];
    const borderColor = DEPT_COLORS[c.dept] || (c.type==='elective'?'#8b5cf6':'#3b82f6');
    return (
      <div draggable
        onDragStart={e=>{e.stopPropagation();setDragging(c);}}
        onDragEnd={()=>{ if(!dragOver) setDragging(null); }}
        style={{
          background:inCell?'var(--white)':'var(--bg)',
          border:'1px solid var(--border)',
          borderLeft:`3px solid ${borderColor}`,
          borderRadius:7,padding:'.3rem .55rem',cursor:'grab',
          fontSize:'11.5px',userSelect:'none',
          display:'flex',alignItems:'center',gap:'.4rem',minWidth:0,
          opacity:dragging?.id===c.id?.5:1,
          boxShadow:'var(--shadow-sm)',
        }}>
        <span style={{flexShrink:0,fontSize:'11px'}}>{c.type==='elective'?'🎨':'✏️'}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,color:'var(--navy)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'12px'}}>{c.name}</div>
          <div style={{display:'flex',gap:3,marginTop:1,alignItems:'center'}}>
            {c.dept && <span style={{fontSize:'9px',color:borderColor,fontWeight:600}}>{c.dept}</span>}
            {displayGrade && <span style={{fontSize:'9px',fontWeight:700,padding:'0 4px',borderRadius:3,background:GRADE_COLORS[displayGrade]+'22',color:GRADE_COLORS[displayGrade],marginLeft:c.dept?4:0}}>Gr{displayGrade}</span>}
            {c.room && <span style={{fontSize:'9px',color:'var(--text3)',marginLeft:2}}>· Rm {c.room}</span>}
          </div>
        </div>
        {inCell && <button onClick={e=>{e.stopPropagation();removeFromCell(c);}} style={{background:'none',border:'none',cursor:'pointer',color:'#bbb',padding:'0 2px',fontSize:13,lineHeight:1,flexShrink:0}}>×</button>}
      </div>
    );
  };

  const core      = courses.filter(c=>c.type!=='elective');
  const electives = courses.filter(c=>c.type==='elective');
  const combined  = courses.filter(c=>(c.name||'').includes(','));

  return (
    <div>
      {/* Tabs */}
      <div style={{display:'flex',gap:2,marginBottom:'1.25rem',background:'var(--bg2)',borderRadius:10,padding:3,width:'fit-content'}}>
        {[['grid','📅 Schedule Grid'],['list','📋 Course List'],['auto','⚡ Auto-Schedule']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            padding:'.4rem .9rem',fontSize:'13px',fontWeight:tab===id?600:400,border:'none',
            background:tab===id?'var(--white)':'transparent',borderRadius:7,cursor:'pointer',
            color:tab===id?'var(--navy)':'var(--text3)',fontFamily:'inherit',
            boxShadow:tab===id?'var(--shadow-sm)':'none',whiteSpace:'nowrap',transition:'all .15s',
          }}>{label}</button>
        ))}
      </div>

      {/* ═══ SCHEDULE GRID ═══ */}
      {tab==='grid' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 210px',gap:'1.25rem',alignItems:'start'}}>
          {/* Grid */}
          <div className="panel" style={{overflow:'hidden'}}>
            <div className="panel-header">
              <div><div className="panel-title">Schedule Grid</div><div className="panel-subtitle">Drag courses from the right into any cell · Click × to remove</div></div>
            </div>
            {allPeriods.length===0 ? (
              <div className="empty"><span className="empty-icon">🔔</span><div className="empty-text">Set up your Bell Schedule first</div></div>
            ) : (
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',minWidth:580}}>
                  <thead>
                    <tr>
                      <th style={{background:'var(--navy)',color:'white',padding:'.55rem .75rem',fontSize:'11px',textAlign:'left',minWidth:110,position:'sticky',left:0,zIndex:4}}>Period</th>
                      {GRADES_ALL.map(g=>(
                        <th key={g} style={{background:GRADE_COLORS[g],color:'white',padding:'.55rem .75rem',fontSize:'12px',fontWeight:700,textAlign:'center',minWidth:155}}>Grade {g}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {allPeriods.map((b,pi) => {
                      const p = b.period||b;
                      const isNT = NON_TEACH(p);
                      return (
                        <tr key={p} style={{borderBottom:'1px solid var(--border)',opacity:isNT?.6:1}}>
                          <td style={{
                            padding:'.4rem .7rem',fontWeight:600,fontSize:'11px',color:'var(--navy)',
                            background:isNT?'#f2f1ef':pi%2===0?'var(--bg)':'#f5f5f2',
                            borderRight:'2px solid var(--border)',position:'sticky',left:0,zIndex:2,
                          }}>
                            <div>{p}</div>
                            {b.realStart&&<div style={{fontSize:'9px',color:'var(--text3)',fontWeight:400}}>⏰{b.realStart}–{b.realEnd}</div>}
                            {b.gameStart&&<div style={{fontSize:'9px',color:'var(--text3)',fontWeight:400}}>🎮{b.gameStart}–{b.gameEnd}</div>}
                          </td>
                          {GRADES_ALL.map(g => {
                            const cellCourses = grid[p]?.[g] || [];
                            const isOver = dragOver?.period===p && dragOver?.grade===g;
                            return (
                              <td key={g}
                                onDragOver={e=>{ if(!isNT){e.preventDefault();setDragOver({period:p,grade:g});}}}
                                onDragLeave={()=>setDragOver(null)}
                                onDrop={async e=>{ if(isNT)return; e.preventDefault(); setDragOver(null); await dropOnCell(p,g); }}
                                style={{
                                  padding:'.3rem .35rem',verticalAlign:'top',minHeight:50,
                                  background:isNT?'#f5f4f1':isOver?'rgba(29,158,117,.07)':pi%2===0?'var(--white)':'#fafaf9',
                                  border:isOver?'2px dashed var(--teal)':'1px solid var(--border)',
                                  transition:'background .1s',
                                }}>
                                {isNT ? (
                                  <div style={{height:42,display:'flex',alignItems:'center',justifyContent:'center',color:'#ccc',fontSize:'11px'}}>
                                    {p.toLowerCase().includes('lunch')?'🍽️ Lunch':p.toLowerCase().includes('homeroom')?'🏠 Homeroom':'—'}
                                  </div>
                                ) : cellCourses.length > 0 ? (
                                  <div style={{display:'flex',flexDirection:'column',gap:'.25rem'}}>
                                    {cellCourses.map(c=><Chip key={c.id} c={c} inCell={true} grade={g}/>)}
                                    {/* Drop indicator when dragging over occupied cell */}
                                    {isOver && <div style={{height:28,border:'2px dashed var(--teal)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--teal)',fontSize:'10px'}}>+ Add here</div>}
                                  </div>
                                ) : (
                                  <div style={{height:42,display:'flex',alignItems:'center',justifyContent:'center',color:isOver?'var(--teal)':'#ddd',fontSize:'11px',fontStyle:'italic'}}>
                                    {isOver?'Drop here':'—'}
                                  </div>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Side panel */}
          <div style={{display:'flex',flexDirection:'column',gap:'.85rem',position:'sticky',top:'1rem'}}>
            {/* Drag palette — unique course names, one chip per course */}
            <div className="panel">
              <div className="panel-header" style={{padding:'.7rem 1rem'}}>
                <div>
                  <div className="panel-title" style={{fontSize:'13.5px'}}>Courses</div>
                  <div className="panel-subtitle">Drag into any cell</div>
                </div>
                <span className="badge badge-navy">{courses.length}</span>
              </div>
              <div style={{padding:'.5rem',display:'flex',flexDirection:'column',gap:'.3rem',maxHeight:420,overflowY:'auto'}}>
                {/* Deduplicate by name for the palette — show one chip per unique course name */}
                {[...new Map(courses.map(c=>[c.name,c])).values()].map(c=>(
                  <Chip key={c.id} c={c} inCell={false}/>
                ))}
              </div>
            </div>
            {/* Unscheduled */}
            {unscheduled.length > 0 && (
              <div className="panel">
                <div className="panel-header" style={{padding:'.7rem 1rem'}}>
                  <div className="panel-title" style={{fontSize:'13.5px'}}>⚠️ Unscheduled</div>
                  <span className="badge badge-red">{unscheduled.length}</span>
                </div>
                <div style={{padding:'.5rem',display:'flex',flexDirection:'column',gap:'.3rem',maxHeight:200,overflowY:'auto'}}>
                  {unscheduled.map(c=><Chip key={c.id} c={c} inCell={false}/>)}
                </div>
              </div>
            )}
            <div style={{background:'var(--bg)',borderRadius:8,padding:'.65rem',fontSize:'11.5px',color:'var(--text3)'}}>
              <div style={{fontWeight:600,color:'var(--text2)',marginBottom:'.3rem'}}>How to use</div>
              <div>• Drag a course into any cell</div>
              <div>• Same course can go in multiple grades</div>
              <div>• Click × to remove from a cell</div>
            </div>
          </div>
        </div>
      )}

      {/* ═══ COURSE LIST ═══ */}
      {tab==='list' && (
        <div>
          {/* Official curriculum loader */}
          <div style={{background:'linear-gradient(135deg,#0B1F4A,#0a2a1e)',borderRadius:'var(--radius)',padding:'1rem 1.5rem',marginBottom:'1.25rem',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'1rem',flexWrap:'wrap'}}>
            <div>
              <div style={{color:'white',fontWeight:600,fontSize:'14px'}}>📚 Official LHS Curriculum</div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:'12px',marginTop:'2px'}}>24 courses · 4 grades × 6 classes · 4 core + 2 electives per grade</div>
            </div>
            <button
              className="btn btn-sm"
              style={{background:'var(--teal)',color:'white',border:'none',fontWeight:700,flexShrink:0}}
              onClick={seedCurriculum}
              disabled={saving}
            >
              {saving?<div className="spinner"/>:'⚡ Load Official Curriculum'}
            </button>
          </div>
          <div style={{display:'flex',gap:'.5rem',marginBottom:'1rem',flexWrap:'wrap',alignItems:'center'}}>
            {combined.length>0&&(
              <button className="btn btn-sm" style={{background:'#fffbeb',border:'1px solid #f0d080',color:'#8c5e00',fontWeight:600}}
                onClick={async()=>{
                  if(!confirm(`Split all ${combined.length} combined courses?`))return;
                  for(const c of combined) await splitCourse(c);
                }}>✂️ Split {combined.length} combined</button>
            )}
            <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={openNew}><Icon name="plus" size={13}/> New Course</button>
          </div>
          {(() => {
            const DEPT_ORDER = ['English','Math','Science','Social Studies','World Language','PE & Health','Fine Arts','CTE'];
            // Group by dept, maintaining order; unknown depts go at end
            const byDept = {};
            courses.forEach(c => {
              const d = c.dept || 'Other';
              if (!byDept[d]) byDept[d] = [];
              byDept[d].push(c);
            });
            const depts = [
              ...DEPT_ORDER.filter(d => byDept[d]?.length),
              ...Object.keys(byDept).filter(d => !DEPT_ORDER.includes(d) && byDept[d]?.length)
            ];
            if (depts.length === 0) return (
              <div className="panel">
                <div className="empty"><span className="empty-icon">📚</span><div className="empty-text">No courses yet</div><div className="empty-sub">Click "Load Official Curriculum" above or add courses manually</div></div>
              </div>
            );
            return depts.map(dept => {
              const list = byDept[dept];
              const color = DEPT_COLORS[dept] || '#888';
              return (
                <div key={dept} className="panel" style={{marginBottom:'1rem',borderTop:`3px solid ${color}`}}>
                  <div className="panel-header">
                    <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
                      <span style={{width:10,height:10,borderRadius:'50%',background:color,display:'inline-block',flexShrink:0}}/>
                      <span className="panel-title">{dept}</span>
                      <span style={{fontSize:'11.5px',color:'var(--text3)',fontWeight:400}}>
                        {list.filter(c=>c.type==='core').length} core · {list.filter(c=>c.type==='elective').length} elective
                      </span>
                    </div>
                    <span className="badge badge-navy">{list.length}</span>
                  </div>
                  <div className="table-scroll">
                    <table>
                      <thead><tr><th style={{width:28}}></th><th>Course</th><th>Type</th><th>Grades</th><th>Room</th><th>Period</th><th>Teachers</th><th></th></tr></thead>
                      <tbody>
                        {list.map((c,i)=>(
                          <tr key={c.id} draggable
                            onDragStart={e=>onDragStartList(e,courses.indexOf(c))}
                            onDragEnter={e=>onDragEnterList(e,courses.indexOf(c))}
                            onDragEnd={onDragEndList}
                            onDragOver={e=>e.preventDefault()}>
                            <td><span className="drag-handle">⠿</span></td>
                            <td style={{fontWeight:600,color:'var(--navy)'}}>{c.name}</td>
                            <td>
                              <span style={{fontSize:'10.5px',fontWeight:600,padding:'2px 7px',borderRadius:10,
                                background:c.type==='core'?'#e8eeff':'#f0ebff',
                                color:c.type==='core'?'#1a3470':'#6d28d9'}}>
                                {c.type==='core'?'Core':'Elective'}
                              </span>
                            </td>
                            <td>
                              {(c.grades||[]).sort().map(g=>(
                                <span key={g} style={{display:'inline-block',width:22,height:22,lineHeight:'22px',textAlign:'center',borderRadius:'50%',background:GRADE_COLORS[g]+'22',color:GRADE_COLORS[g],fontSize:'10px',fontWeight:700,marginRight:2}}>
                                  {g}
                                </span>
                              ))}
                            </td>
                            <td style={{fontSize:'12px',fontWeight:600,color:'var(--text2)'}}>{c.room ? <span style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,padding:'2px 7px',fontSize:'11px'}}>Rm {c.room}</span> : <span style={{color:'var(--text3)'}}>—</span>}</td>
                            <td>{c.period?<span style={{color:'var(--teal)',fontWeight:600,fontSize:'12px'}}>{c.period}</span>:<span style={{color:'var(--text3)',fontSize:'12px'}}>—</span>}</td>
                            <td style={{fontSize:'12px',color:'var(--text2)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                              {(c.teacherIds||[]).map(id=>users.find(u=>u.id===id)?.displayName).filter(Boolean).join(', ')||<span style={{color:'var(--text3)'}}>Unassigned</span>}
                            </td>
                            <td style={{display:'flex',gap:'.3rem'}}>
                              {c.name.includes(',')&&<button className="btn btn-ghost btn-sm" style={{color:'#b07d00',fontSize:'11px'}} onClick={()=>splitCourse(c)}>✂️</button>}
                              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(c)}><Icon name="edit" size={12}/></button>
                              <button className="btn btn-danger btn-sm" onClick={()=>deleteCourse(c)}><Icon name="trash" size={12}/></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* ═══ AUTO-SCHEDULE ═══ */}
      {tab==='auto' && (
        <div className="panel">
          <div className="panel-header">
            <div><div className="panel-title">⚡ Auto-Schedule</div><div className="panel-subtitle">Fills every grade slot with no conflicts</div></div>
          </div>
          <div className="panel-body">
            <div style={{background:'#f0fdf8',border:'1px solid #9fe1cb',borderRadius:10,padding:'1rem 1.25rem',marginBottom:'1.25rem',fontSize:'13px',color:'#0a5c45',lineHeight:1.8}}>
              <strong>How it works:</strong><br/>
              1. Each course gets placed in <strong>one cell</strong> — one period + one grade<br/>
              2. Courses spread across all grade columns automatically<br/>
              3. No teacher teaches two classes in the same period<br/>
              4. No teacher teaches two classes in the same period<br/>
              5. Courses spread evenly across {teachPeriodNames.length} teaching periods
            </div>

            <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
              <button className="btn btn-primary" style={{background:'linear-gradient(135deg,#1D9E75,#0f6e56)',fontWeight:700,fontSize:'14px',padding:'.6rem 1.5rem'}} onClick={runAutoSchedule} disabled={scheduling||courses.length===0||teachPeriodNames.length===0}>
                {scheduling?<><div className="spinner" style={{width:14,height:14,marginRight:6}}/> Scheduling...</>:`⚡ Auto-schedule ${courses.length} courses →`}
              </button>
              <span style={{fontSize:'12px',color:'var(--text3)'}}>{teachPeriodNames.length} teaching periods · {courses.length} courses</span>
            </div>
            {schedResult&&(
              <div style={{marginTop:'1.5rem',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                <div style={{background:'var(--navy)',color:'white',padding:'.5rem .75rem',fontSize:'13px',fontWeight:600}}>
                  ✓ {schedResult.assigned.length} placed · {schedResult.conflicts.length} conflicts
                </div>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                  <thead><tr style={{background:'var(--bg)'}}><th style={{padding:'.4rem .75rem',textAlign:'left'}}>Period</th>{GRADES_ALL.map(g=><th key={g} style={{padding:'.4rem .75rem',textAlign:'center',color:GRADE_COLORS[g],fontWeight:700}}>Gr{g}</th>)}</tr></thead>
                  <tbody>
                    {(schedResult.bellPeriods||teachPeriodNames).map((p,i)=>{
                      const row={};
                      schedResult.assigned.filter(c=>c.period===p).forEach(c=>(c.grades||[]).forEach(g=>{row[g]=c;}));
                      return (
                        <tr key={p} style={{borderTop:'1px solid var(--border)',background:i%2?'var(--bg)':'var(--white)'}}>
                          <td style={{padding:'.35rem .75rem',fontWeight:600,color:'var(--navy)',borderRight:'1px solid var(--border)'}}>{p}</td>
                          {GRADES_ALL.map(g=><td key={g} style={{padding:'.3rem .4rem',textAlign:'center'}}>
                            {row[g]?<span style={{background:'#e8eeff',border:'1px solid #c5d0f5',borderRadius:5,padding:'2px 6px',fontSize:'11px',fontWeight:600,color:'var(--navy)'}}>{row[g].name}</span>:<span style={{color:'#ddd'}}>—</span>}
                          </td>)}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {schedResult.conflicts.length>0&&(
                  <div style={{background:'#fff5f5',borderTop:'1px solid #fca5a5',padding:'.75rem 1rem',fontSize:'12px',color:'#c0392b'}}>
                    <strong>Couldn't place:</strong> {schedResult.conflicts.join(', ')}
                    <div style={{marginTop:'.25rem',opacity:.8}}>Set grades manually in Course List, then re-run.</div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ═══ COURSE MODAL ═══ */}
      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-header">
              <span className="modal-title">{editing?'Edit Course':'New Course'}</span>
              <button className="modal-close" onClick={()=>setModal(false)}><Icon name="x" size={14}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Course name</label>
                <input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. English 9, Photography"/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'.75rem'}}>
                <div className="form-group">
                  <label className="form-label">Type</label>
                  <select className="form-input form-select" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    <option value="core">Core</option>
                    <option value="elective">Elective</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Department</label>
                  <select className="form-input form-select" value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>
                    <option value="">— Select —</option>
                    {['English','Math','Science','Social Studies','World Language','PE & Health','Fine Arts','CTE'].map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Period</label>
                  <select className="form-input form-select" value={form.period} onChange={e=>setForm(f=>({...f,period:e.target.value}))}>
                    <option value="">— None —</option>
                    {teachPeriodNames.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Room #</label>
                  <input className="form-input" value={form.room} onChange={e=>setForm(f=>({...f,room:e.target.value}))} placeholder="e.g. 117"/>
                </div>
              </div>              <div className="form-group">
                <label className="form-label">Teachers</label>
                <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                  <div style={{padding:'.35rem .4rem',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}>
                    <input
                      className="form-input"
                      placeholder="Search teachers..."
                      value={teacherSearch}
                      onChange={e=>setTeacherSearch(e.target.value)}
                      style={{fontSize:'12px',padding:'.25rem .5rem',height:'auto'}}
                    />
                  </div>
                  <div style={{maxHeight:180,overflowY:'auto',padding:'.25rem'}}>
                    {users
                      .filter(u => (u.rpName||u.displayName||'').toLowerCase().includes(teacherSearch.toLowerCase()))
                      .map(u=>(
                        <label key={u.id}
                          style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.35rem .4rem',cursor:'pointer',fontSize:'13px',borderRadius:5,background:form.teacherIds.includes(u.id)?'#f0fdf8':'transparent',userSelect:'none'}}>
                          <input type="checkbox" checked={form.teacherIds.includes(u.id)} onChange={()=>toggleT(u.id)}/>
                          <div className="avatar" style={{width:22,height:22,fontSize:9,flexShrink:0}}>{(u.displayName||'?')[0].toUpperCase()}</div>
                          <span style={{fontWeight:500,flex:1}}>{u.rpName||u.displayName}</span>
                          <span style={{color:'var(--text3)',fontSize:'11px',flexShrink:0}}>{u.rankName}</span>
                        </label>
                      ))
                    }
                    {users.filter(u=>(u.rpName||u.displayName||'').toLowerCase().includes(teacherSearch.toLowerCase())).length===0&&(
                      <div style={{color:'var(--text3)',fontSize:'12px',padding:'.5rem .4rem'}}>No teachers match "{teacherSearch}"</div>
                    )}
                  </div>
                  {form.teacherIds.length > 0 && (
                    <div style={{padding:'.3rem .6rem',borderTop:'1px solid var(--border)',background:'#f0fdf8',fontSize:'11.5px',color:'var(--teal)',fontWeight:500}}>
                      ✓ {form.teacherIds.length} teacher{form.teacherIds.length!==1?'s':''} selected
                    </div>
                  )}
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveCourse} disabled={saving||!form.name}>{saving?<div className="spinner"/>:'Save'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function ManageBellSchedule({ profile }) {
  const [periods, setPeriods] = useState(null); // null = loading
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#6b7280','#1D9E75','#0B1F4A','#e74c3c'];

  useEffect(() => {
    db.collection('settings').doc('bell_schedule').get().then(doc => {
      if (doc.exists && doc.data().periods?.length) {
        setPeriods(doc.data().periods.map(p=>({...p})));
      } else {
        setPeriods(BELL_SCHEDULE.map(p=>({...p})));
      }
    });
  }, []);

  const update = (i, field, val) => {
    setSaved(false);
    setPeriods(p => p.map((row,idx) => idx===i ? {...row,[field]:val} : row));
  };

  const addPeriod = () => {
    setSaved(false);
    setPeriods(p => [...p, { period:`Period ${p.length+1}`, realStart:'00:00', realEnd:'00:00', gameStart:'0:00 AM', gameEnd:'0:00 AM', color:'#3b82f6' }]);
  };

  const removePeriod = (i) => {
    if (!confirm('Remove this period?')) return;
    setSaved(false);
    setPeriods(p => p.filter((_,idx)=>idx!==i));
  };

  const save = async () => {
    setSaving(true);
    await db.collection('settings').doc('bell_schedule').set({ periods, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: profile.displayName });
    await addLog(profile.id, profile.displayName, 'Updated bell schedule');
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false), 3000);
  };

  const resetToDefault = () => {
    if (!confirm('Reset to the default bell schedule? Your changes will be lost.')) return;
    setPeriods(BELL_SCHEDULE.map(p=>({...p})));
    setSaved(false);
  };

  // Drag to reorder
  const onDragStart = (i) => setDragIdx(i);
  const onDragOver = (e, i) => { e.preventDefault(); setDragOverIdx(i); };
  const onDrop = (i) => {
    if (dragIdx === null || dragIdx === i) { setDragIdx(null); setDragOverIdx(null); return; }
    setPeriods(p => {
      const arr = [...p];
      const [moved] = arr.splice(dragIdx, 1);
      arr.splice(i, 0, moved);
      return arr;
    });
    setDragIdx(null); setDragOverIdx(null); setSaved(false);
  };

  if (!periods) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'4rem'}}><div className="spinner spinner-dark"/></div>;

  return (
    <div>
      <div className="panel">
        <div className="panel-header" style={{flexWrap:'wrap',gap:'.75rem'}}>
          <div>
            <div className="panel-title">Bell Schedule Editor</div>
            <div className="panel-subtitle">Set real times and in-game times for each period · Drag rows to reorder</div>
          </div>
          <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
            {saved && <span style={{fontSize:'12px',color:'var(--teal)',fontWeight:500}}>✓ Saved</span>}
            <button className="btn btn-ghost btn-sm" onClick={resetToDefault}>Reset to default</button>
            <button className="btn btn-ghost btn-sm" onClick={addPeriod}><Icon name="plus" size={12}/> Add period</button>
            <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>
              {saving?<div className="spinner"/>:'Save schedule'}
            </button>
          </div>
        </div>

        {/* Column headers */}
        <div style={{display:'grid',gridTemplateColumns:'28px 160px 110px 110px 130px 130px 80px 36px',gap:'.5rem',padding:'.5rem 1.25rem',background:'var(--bg)',borderBottom:'1px solid var(--border)',fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em'}}>
          <div/>
          <div>Period name</div>
          <div>Real start</div>
          <div>Real end</div>
          <div>Game start</div>
          <div>Game end</div>
          <div>Color</div>
          <div/>
        </div>

        {periods.map((p, i) => (
          <div
            key={i}
            draggable
            onDragStart={()=>onDragStart(i)}
            onDragOver={e=>onDragOver(e,i)}
            onDragLeave={()=>setDragOverIdx(null)}
            onDrop={()=>onDrop(i)}
            style={{
              display:'grid',gridTemplateColumns:'28px 160px 110px 110px 130px 130px 80px 36px',
              gap:'.5rem',padding:'.6rem 1.25rem',
              borderBottom:'1px solid var(--border)',alignItems:'center',
              background: dragOverIdx===i ? 'rgba(29,158,117,.05)' : i%2===0 ? 'var(--white)' : '#fafaf9',
              borderLeft: `3px solid ${p.color||'#888'}`,
              transition:'background .1s',
              cursor:'grab',
            }}
          >
            <div style={{color:'var(--text3)',fontSize:'14px',cursor:'grab'}}>⠿</div>
            <input
              className="form-input"
              value={p.period}
              onChange={e=>update(i,'period',e.target.value)}
              style={{fontSize:'13px',fontWeight:500,padding:'.3rem .5rem',height:'auto'}}
            />
            <input className="form-input" value={p.realStart} onChange={e=>update(i,'realStart',e.target.value)} placeholder="08:00" style={{fontSize:'13px',padding:'.3rem .5rem',height:'auto',fontFamily:'monospace'}}/>
            <input className="form-input" value={p.realEnd} onChange={e=>update(i,'realEnd',e.target.value)} placeholder="08:50" style={{fontSize:'13px',padding:'.3rem .5rem',height:'auto',fontFamily:'monospace'}}/>
            <input className="form-input" value={p.gameStart} onChange={e=>update(i,'gameStart',e.target.value)} placeholder="8:00 AM" style={{fontSize:'13px',padding:'.3rem .5rem',height:'auto'}}/>
            <input className="form-input" value={p.gameEnd} onChange={e=>update(i,'gameEnd',e.target.value)} placeholder="9:15 AM" style={{fontSize:'13px',padding:'.3rem .5rem',height:'auto'}}/>
            <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
              <input type="color" value={p.color||'#3b82f6'} onChange={e=>update(i,'color',e.target.value)} style={{width:32,height:28,border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',padding:2}}/>
            </div>
            <button className="btn btn-danger btn-sm" style={{padding:'.25rem .4rem'}} onClick={()=>removePeriod(i)}><Icon name="trash" size={12}/></button>
          </div>
        ))}

        {/* Preview */}
        <div style={{padding:'1.25rem',borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>Preview</div>
          <div style={{background:'linear-gradient(135deg,#0B1F4A,#0a2a1e)',borderRadius:'var(--radius)',padding:'1rem 1.25rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:'.4rem'}}>
              {periods.map((b,i)=>(
                <div key={i} style={{background:'rgba(255,255,255,.06)',borderRadius:8,padding:'.5rem .75rem',display:'flex',alignItems:'center',gap:'.5rem',border:`1px solid ${b.color||'#888'}44`}}>
                  <div style={{width:3,alignSelf:'stretch',borderRadius:2,background:b.color||'#888',flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:'11px',fontWeight:600,color:'white'}}>{b.period}</div>
                    <div style={{fontSize:'9.5px',color:'rgba(255,255,255,.45)',marginTop:'1px'}}>{b.realStart}–{b.realEnd} · {b.gameStart}–{b.gameEnd}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

fixHeight();
window.addEventListener('resize', fixHeight);
</script>

  const [rpPrefix, setRpPrefix] = useState(profile.rpPrefix || 'Mr.');
  const [rpFirstName, setRpFirstName] = useState(profile.rpFirstName || '');
  const [rpLastName, setRpLastName] = useState(profile.rpLastName || '');
  const [saving, setSaving] = useState(false);
  const [warnings, setWarnings] = useState([]);
  const [commendations, setCommendations] = useState([]);
  const [myCourses, setMyCourses] = useState([]);

  useEffect(() => {
    db.collection('disciplinary').where('userId','==',profile.id).onSnapshot(s=>{let d=s.docs.map(x=>({id:x.id,...x.data()}));d.sort((a,b)=>(b.issuedAt?.toDate?.()?.getTime()||0)-(a.issuedAt?.toDate?.()?.getTime()||0));setWarnings(d);});
    db.collection('commendations').where('userId','==',profile.id).onSnapshot(s=>{let d=s.docs.map(x=>({id:x.id,...x.data()}));d.sort((a,b)=>(b.createdAt?.toDate?.()?.getTime()||0)-(a.createdAt?.toDate?.()?.getTime()||0));setCommendations(d);});
    // Fetch all courses and filter client-side — avoids array-contains index issues
    db.collection('courses').get()
      .then(s => {
        const all = s.docs.map(d=>({id:d.id,...d.data()}));
        const mine = all.filter(c => {
          const ids = c.teacherIds || [];
          return ids.includes(profile.id);
        });
        setMyCourses(mine);
      })
      .catch(() => setMyCourses([]));
  }, []);

  const save = async () => {
    setSaving(true);
    const rpName = `${rpPrefix} ${rpFirstName.trim()} ${rpLastName.trim()}`;
    const updates = {
      robloxUsername,
      rpName,
      rpPrefix,
      rpFirstName: rpFirstName.trim(),
      rpLastName: rpLastName.trim(),
      displayName: rpName, // keep displayName in sync
    };
    await db.collection('users').doc(profile.id).update(updates);
    await addLog(profile.id, profile.displayName, 'Updated their profile');
    setProfile(p => ({ ...p, ...updates }));
    setEditing(false); setSaving(false);
  };

  const warnColor = { verbal_warning:'#f0a500', written_warning:'#e67e22', suspension:'#e74c3c', termination:'#c0392b' };
  const rpPreview = `${rpPrefix} ${rpFirstName.trim()} ${rpLastName.trim()}`.trim();

  return (
    <div>
      <div className="grid-2col" style={{marginBottom:'1.25rem'}}>
        <div className="panel">
          <div className="panel-header">
            <div><div className="panel-title">My Profile</div><div className="panel-subtitle">Your personal information</div></div>
            {!editing && <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(true)}><Icon name="edit" size={13}/> Edit</button>}
          </div>
          <div className="panel-body">
            {/* RP Name section */}
            <div className="field">
              <div className="field-label">Roleplay name</div>
              {editing ? (
                <div>
                  <div style={{display:'flex',gap:'.4rem',marginBottom:'.35rem'}}>
                    <select className="form-input form-select" value={rpPrefix} onChange={e=>setRpPrefix(e.target.value)} style={{width:90,flexShrink:0}}>
                      <option value="Mr.">Mr.</option>
                      <option value="Miss.">Miss.</option>
                      <option value="Mrs.">Mrs.</option>
                      <option value="Ms.">Ms.</option>
                      <option value="Dr.">Dr.</option>
                      <option value="Coach">Coach</option>
                    </select>
                    <input className="form-input" value={rpFirstName} onChange={e=>setRpFirstName(e.target.value)} placeholder="First name" style={{flex:1}}/>
                    <input className="form-input" value={rpLastName} onChange={e=>setRpLastName(e.target.value)} placeholder="Last name" style={{flex:1}}/>
                  </div>
                  {rpFirstName && rpLastName && <div style={{fontSize:'12px',color:'var(--text3)'}}>Preview: <strong style={{color:'var(--navy)'}}>{rpPreview}</strong></div>}
                </div>
              ) : (
                <div className="field-value" style={{fontFamily:"'Playfair Display',serif",fontSize:'16px',color:'var(--navy)',fontWeight:600}}>
                  {profile.rpName || profile.displayName || '—'}
                </div>
              )}
            </div>

            {/* Other fields */}
            {[
              ['Roblox username', editing ? null : (profile.robloxUsername||'—')],
              ['Email', profile.email],
              ['Rank', profile.rankName||'Unranked'],
              ['Department', profile.departmentName||'—'],
              ['Status', <span className={`badge ${profile.status==='active'?'badge-active':'badge-pending'}`}>{profile.status}</span>],
              ['Member since', fmtDate(profile.createdAt)],
            ].map(([label,val])=>(
              <div className="field" key={label}>
                <div className="field-label">{label}</div>
                {label==='Roblox username'&&editing
                  ? <input className="form-input" value={robloxUsername} onChange={e=>setRobloxUsername(e.target.value)}/>
                  : <div className="field-value">{val}</div>
                }
              </div>
            ))}
            {editing && <div style={{display:'flex',gap:'.5rem',marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border)'}}>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<div className="spinner"/>:'Save changes'}</button>
              <button className="btn btn-ghost" onClick={()=>{setEditing(false);setRpPrefix(profile.rpPrefix||'Mr.');setRpFirstName(profile.rpFirstName||'');setRpLastName(profile.rpLastName||'');}}>Cancel</button>
            </div>}
          </div>
        </div>
        <div className="panel">
          <div className="panel-header"><div><div className="panel-title">My Attendance</div><div className="panel-subtitle">Recent 10 sessions</div></div></div>
          <div className="panel-body"><AttendanceMini uid={profile.id}/></div>
        </div>
      </div>
      <div className="grid-2col">
        <div className="panel">
          <div className="panel-header"><div className="panel-title">My Commendations</div></div>
          <div className="panel-body">
            {commendations.length===0 ? <div className="empty" style={{padding:'1.5rem'}}><div className="empty-text">No commendations yet</div></div>
              : commendations.map(c=>(
                <div key={c.id} className="commendation-card">
                  <div className="commendation-text">"{c.message}"</div>
                  <div className="commendation-meta"><span>From {c.issuedBy}</span><span>·</span><span>{fmtDate(c.createdAt)}</span></div>
                </div>
              ))
            }
          </div>
        </div>
        <div className="panel">
          <div className="panel-header"><div className="panel-title">My Disciplinary Record</div></div>
          <div className="panel-body">
            {warnings.length===0 ? <div className="empty" style={{padding:'1.5rem'}}><div className="empty-icon">✓</div><div className="empty-text">Clean record</div></div>
              : warnings.map(w=>(
                <div key={w.id} className="warning-item">
                  <div style={{width:9,height:9,borderRadius:'50%',background:warnColor[w.type]||'#aaa',marginTop:5,flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:500,textTransform:'capitalize'}}>{w.type.replace(/_/g,' ')}</div>
                    <div style={{fontSize:'12px',color:'var(--text3)'}}>{w.reason} · {fmtDate(w.issuedAt)}</div>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      </div>

      {/* My Courses — shown for all staff, prominent if assigned */}
      {(myCourses.length > 0 || profile.rankName?.toLowerCase().includes('instructor')) && (
        <div className="panel" style={{marginTop:'1.25rem'}}>
          <div className="panel-header">
            <div>
              <div className="panel-title">My Courses</div>
              <div className="panel-subtitle">Courses you are assigned to teach</div>
            </div>
            <span className="badge badge-teal">{myCourses.length} course{myCourses.length!==1?'s':''}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:'1rem',padding:'1.25rem'}}>
            {myCourses.length === 0 ? (
              <div className="empty" style={{gridColumn:'1/-1',padding:'1.5rem'}}>
                <span className="empty-icon">📚</span>
                <div className="empty-text">No courses assigned yet</div>
                <div className="empty-sub">Ask an admin to assign you to a course in Manage Courses</div>
              </div>
            ) : myCourses.map(c => (
              <div key={c.id} style={{
                background: c.type==='core' ? 'linear-gradient(135deg,#f0f4ff,#e8eeff)' : 'linear-gradient(135deg,#f5f0ff,#ede8ff)',
                border: `1px solid ${c.type==='core' ? '#c5d0f5' : '#d5c8f5'}`,
                borderRadius: 'var(--radius)',
                padding: '1rem 1.25rem',
                display: 'flex', flexDirection: 'column', gap: '.5rem',
              }}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'.5rem'}}>
                  <span style={{fontSize:'22px'}}>{c.type==='core' ? '✏️' : '🎨'}</span>
                  <span className={`badge ${c.type==='core' ? 'badge-navy' : 'badge-teal'}`} style={{fontSize:'10px',textTransform:'uppercase',letterSpacing:'.05em'}}>{c.type||'core'}</span>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:'15px',color:'var(--navy)',lineHeight:1.3}}>{c.name}</div>
                <div style={{display:'flex',flexDirection:'column',gap:'.2rem'}}>
                  {c.room && (
                    <div style={{fontSize:'12px',color:'var(--text2)',display:'flex',alignItems:'center',gap:'.4rem'}}>
                      <span style={{fontSize:'13px'}}>🚪</span>
                      <span><strong style={{color:'var(--navy)'}}>Rm:</strong> {c.room}</span>
                    </div>
                  )}
                  {c.period && (
                    <div style={{fontSize:'12px',color:'var(--text2)',display:'flex',alignItems:'center',gap:'.4rem'}}>
                      <span style={{fontSize:'13px'}}>🕐</span>
                      <span><strong style={{color:'var(--navy)'}}>Period:</strong> {c.period}</span>
                    </div>
                  )}
                  {c.dept && (
                    <div style={{fontSize:'12px',color:'var(--text2)',display:'flex',alignItems:'center',gap:'.4rem'}}>
                      <span style={{fontSize:'13px'}}>📂</span>
                      <span><strong style={{color:'var(--navy)'}}>Dept:</strong> {c.dept}</span>
                    </div>
                  )}
                </div>
                {c.teacherNames && c.teacherNames.length > 1 && (
                  <div style={{fontSize:'11.5px',color:'var(--text3)'}}>
                    Co-taught with {c.teacherNames.filter(n=>n!==profile.displayName&&n!==profile.rpName).join(', ')||'others'}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AttendanceMini({ uid }) {
  const [records, setRecords] = useState([]);
  useEffect(() => {
    db.collection('attendance').where('userId','==',uid).get().then(s=>{let d=s.docs.map(x=>({id:x.id,...x.data()}));d.sort((a,b)=>(b.date?.toDate?.()?.getTime()||0)-(a.date?.toDate?.()?.getTime()||0));setRecords(d.slice(0,10));});
  }, [uid]);
  if (!records.length) return <div className="empty"><span className="empty-icon">📅</span><div className="empty-text">No attendance records</div></div>;
  return records.map(r => (
    <div className="log-entry" key={r.id}>
      <div className="log-dot" style={{background:'var(--teal)'}}/>
      <div className="log-text">{r.session}</div>
      <div className="log-time">{fmtDate(r.date)}</div>
    </div>
  ));
}

// ── Attendance ──
function Attendance({ profile }) {
  const isHR = profile.rankTier >= 5;

  // ── State ──
  const [users, setUsers]     = useState([]);
  const [ranks, setRanks]     = useState([]);
  const [records, setRecords] = useState([]); // flat Firestore records
  const [view, setView]       = useState('grid');     // 'grid' | 'log'
  const [editCell, setEditCell] = useState(null);     // { userId, date, field }
  const [saving, setSaving]   = useState(false);

  // Bulk session logging state
  const [sessionName, setSessionName] = useState('');
  const [sessionDate, setSessionDate] = useState(() => new Date().toISOString().slice(0,10));
  const [bulkStatus, setBulkStatus]   = useState({}); // userId → status

  const STATUS_CYCLE = ['present','absent','late','excused'];
  const STATUS_LABELS = { present:'P', absent:'A', late:'L', excused:'E' };
  const STATUS_COLORS = { present:'present', absent:'absent', late:'late', excused:'excused' };
  const STATUS_FULL   = { present:'Present', absent:'Absent', late:'Late', excused:'Excused' };
  const DOT_COLORS    = { present:'#1D9E75', absent:'#e74c3c', late:'#f0a500', excused:'#3498db' };

  // ── Load users + ranks + records ──
  useEffect(() => {
    // Users sorted by chain of command
    const unsubUsers = db.collection('users').onSnapshot(s => {
      setUsers(s.docs.map(d=>({id:d.id,...d.data()})));
    });
    db.collection('ranks').get().then(s => {
      const docs = s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));
      setRanks(docs);
    });
    // Records — HR sees all, staff sees own
    const recQ = isHR
      ? db.collection('attendance').orderBy('date','desc').limit(200)
      : db.collection('attendance').where('userId','==',profile.id);
    const unsubRec = recQ.onSnapshot(s => {
      let docs = s.docs.map(d=>({id:d.id,...d.data()}));
      if (!isHR) docs.sort((a,b)=>(b.date?.toDate?.()?.getTime()||0)-(a.date?.toDate?.()?.getTime()||0));
      setRecords(docs);
    });
    return () => { unsubUsers(); unsubRec(); };
  }, []);

  // ── Sorted active staff ──
  const activeUsers = users
    .filter(u => u.status === 'active')
    .sort((a,b) => {
      const aR = ranks.find(r=>r.id===a.rankId), bR = ranks.find(r=>r.id===b.rankId);
      const ao = aR?(aR.sortOrder??aR.tier??999):999, bo = bR?(bR.sortOrder??bR.tier??999):999;
      if (ao!==bo) return ao-bo;
      return (a.displayName||'').localeCompare(b.displayName||'');
    });

  // ── Build grid: sessions as columns, users as rows ──
  // Group records by session key "date|session"
  const sessions = useMemo(() => {
    const map = {};
    records.forEach(r => {
      const d = r.date?.toDate?.() || new Date(r.date);
      const key = `${d.toISOString().slice(0,10)}|${r.session||''}`;
      if (!map[key]) map[key] = { date: d, session: r.session||'', key };
    });
    return Object.values(map).sort((a,b) => b.date - a.date).slice(0, 20);
  }, [records]);

  // userId+sessionKey → record
  const cellMap = useMemo(() => {
    const m = {};
    records.forEach(r => {
      const d = r.date?.toDate?.() || new Date(r.date);
      const key = `${d.toISOString().slice(0,10)}|${r.session||''}`;
      m[`${r.userId}|${key}`] = r;
    });
    return m;
  }, [records]);

  // ── Inline cell click — cycle through statuses ──
  const cycleCell = async (userId, sessionKey, currentRecord) => {
    const user = users.find(u=>u.id===userId);
    if (currentRecord) {
      const idx = STATUS_CYCLE.indexOf(currentRecord.status);
      const next = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];
      await db.collection('attendance').doc(currentRecord.id).update({ status: next, editedBy: profile.displayName, editedAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else {
      const [dateStr, session] = sessionKey.split('|');
      await db.collection('attendance').add({
        userId, userName: user?.displayName||'—',
        session, date: firebase.firestore.Timestamp.fromDate(new Date(dateStr+'T12:00:00')),
        status: 'present',
        loggedBy: profile.displayName, loggedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
  };

  const deleteCell = async (recordId) => {
    await db.collection('attendance').doc(recordId).delete();
  };

  // ── Bulk save: save all bulkStatus entries as attendance records ──
  const saveBulkSession = async () => {
    if (!sessionName.trim() || !sessionDate) return;
    const entries = Object.entries(bulkStatus).filter(([,v])=>v);
    if (!entries.length) return;
    setSaving(true);
    const batch = db.batch();
    for (const [userId, status] of entries) {
      const user = users.find(u=>u.id===userId);
      // Check if record already exists for this user+session+date
      const existing = records.find(r => {
        const d = r.date?.toDate?.();
        return r.userId===userId && r.session===sessionName.trim() && d?.toISOString().slice(0,10)===sessionDate;
      });
      if (existing) {
        batch.update(db.collection('attendance').doc(existing.id), { status, editedBy: profile.displayName, editedAt: firebase.firestore.FieldValue.serverTimestamp() });
      } else {
        const ref = db.collection('attendance').doc();
        batch.set(ref, {
          userId, userName: user?.displayName||'—',
          session: sessionName.trim(),
          date: firebase.firestore.Timestamp.fromDate(new Date(sessionDate+'T12:00:00')),
          status, loggedBy: profile.displayName,
          loggedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
    }
    await batch.commit();
    await addLog(profile.id, profile.displayName, 'Logged bulk attendance', `${sessionName} — ${entries.length} staff`);
    setBulkStatus({}); setSessionName(''); setSaving(false);
    setView('grid');
  };

  const setBulkAll = (status) => {
    const m = {};
    activeUsers.forEach(u => m[u.id] = status);
    setBulkStatus(m);
  };

  // ── Staff-only view: simple list ──
  if (!isHR) {
    return (
      <div className="panel">
        <div className="panel-header">
          <div className="panel-title">My Attendance</div>
        </div>
        <div className="table-scroll">
          <table>
            <thead><tr><th>Session</th><th>Date</th><th>Status</th></tr></thead>
            <tbody>
              {records.length===0
                ? <tr><td colSpan="3"><div className="empty"><span className="empty-icon">📅</span><div className="empty-text">No attendance records yet</div></div></td></tr>
                : records.map(r=>(
                  <tr key={r.id}>
                    <td>{r.session}</td>
                    <td>{fmtDate(r.date)}</td>
                    <td>
                      <span style={{display:'inline-flex',alignItems:'center',gap:'.35rem',padding:'2px 8px',borderRadius:4,fontSize:'12px',fontWeight:600,background:r.status==='present'?'rgba(29,158,117,.1)':r.status==='absent'?'rgba(231,76,60,.1)':r.status==='late'?'rgba(240,165,0,.1)':'rgba(52,152,219,.1)',color:r.status==='present'?'#0a5c45':r.status==='absent'?'#c0392b':r.status==='late'?'#8c5e00':'#1a5c8a'}}>
                        <span style={{width:6,height:6,borderRadius:'50%',background:DOT_COLORS[r.status]||'#aaa'}}/>
                        {STATUS_FULL[r.status]||r.status||'—'}
                      </span>
                    </td>
                  </tr>
                ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  // ── HR view ──
  return (
    <div>
      {/* Toolbar */}
      <div className="action-row">
        <div className="action-row-left">
          <div className="filter-tabs">
            <button className={`filter-tab${view==='grid'?' active':''}`} onClick={()=>setView('grid')}>📊 Grid view</button>
            <button className={`filter-tab${view==='log'?' active':''}`} onClick={()=>setView('log')}>➕ Log session</button>
            <button className={`filter-tab${view==='list'?' active':''}`} onClick={()=>setView('list')}>📋 List view</button>
          </div>
        </div>
        <div style={{fontSize:'12px',color:'var(--text3)'}}>
          {records.length} record{records.length!==1?'s':''} · {activeUsers.length} active staff
        </div>
      </div>

      {/* ── LOG SESSION VIEW ── */}
      {view==='log' && (
        <div className="panel">
          <div className="panel-header">
            <div><div className="panel-title">Log Session Attendance</div><div className="panel-subtitle">Set attendance for all staff in one go</div></div>
          </div>
          <div className="panel-body">
            {/* Session info */}
            <div style={{display:'flex',gap:'.75rem',marginBottom:'1.25rem',flexWrap:'wrap',alignItems:'flex-end'}}>
              <div className="form-group" style={{margin:0,flex:1,minWidth:160}}>
                <label className="form-label">Session / event name</label>
                <input className="att-session-input" style={{width:'100%'}} value={sessionName} onChange={e=>setSessionName(e.target.value)} placeholder="e.g. Morning Patrol, Class 3B"/>
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} style={{width:160}}/>
              </div>
              <div style={{display:'flex',gap:'.4rem',paddingBottom:'1px'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setBulkAll('present')} style={{background:'rgba(29,158,117,.1)',color:'#0a5c45',borderColor:'rgba(29,158,117,.3)'}}>All Present</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setBulkAll('absent')} style={{background:'rgba(231,76,60,.08)',color:'#c0392b',borderColor:'rgba(231,76,60,.2)'}}>All Absent</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setBulkStatus({})}>Clear</button>
              </div>
            </div>

            {/* Staff list with status buttons */}
            <div style={{border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr auto',background:'var(--bg)',padding:'.5rem .85rem',borderBottom:'1px solid var(--border)',fontSize:'11px',fontWeight:700,color:'var(--text3)',letterSpacing:'.06em',textTransform:'uppercase'}}>
                <span>Staff member</span><span>Attendance</span>
              </div>
              {activeUsers.map((u,i) => {
                const status = bulkStatus[u.id] || '';
                const rank = ranks.find(r=>r.id===u.rankId);
                return (
                  <div key={u.id} style={{display:'grid',gridTemplateColumns:'1fr auto',alignItems:'center',padding:'.5rem .85rem',borderBottom:i<activeUsers.length-1?'1px solid var(--border)':'none',background:i%2===0?'var(--white)':'var(--bg)'}}>
                    <div>
                      <div style={{fontWeight:500,fontSize:'13.5px',color:'var(--navy)'}}>{u.rpName||u.displayName}</div>
                      <div style={{fontSize:'11px',color:'var(--text3)'}}>{rank?.name||'Unranked'}</div>
                    </div>
                    <div style={{display:'flex',gap:'.3rem'}}>
                      {STATUS_CYCLE.map(s => (
                        <button key={s} onClick={()=>setBulkStatus(b=>({...b,[u.id]:b[u.id]===s?'':s}))}
                          style={{width:32,height:28,border:'1.5px solid',borderRadius:5,fontSize:'11px',fontWeight:700,cursor:'pointer',transition:'all .1s',
                            background: status===s ? DOT_COLORS[s] : 'transparent',
                            color: status===s ? 'white' : DOT_COLORS[s],
                            borderColor: DOT_COLORS[s],
                            opacity: status && status!==s ? .3 : 1,
                          }}>
                          {STATUS_LABELS[s]}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'1.25rem',flexWrap:'wrap',gap:'.75rem'}}>

// ── Staff (HR only) ──
function Staff({ profile }) {
  const [staff, setStaff] = useState([]);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [ranks, setRanks] = useState([]);
  const [departments, setDepartments] = useState([]);

  useEffect(() => {
    const unsub = db.collection('users').onSnapshot(s => setStaff(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('ranks').orderBy('tier').get().then(s=>{
      const docs=s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));
      setRanks(docs);
    });
    db.collection('departments').orderBy('name').get().then(s=>setDepartments(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, []);

  const updateUser = async (uid, changes) => {
    await db.collection('users').doc(uid).update(changes);
    await addLog(profile.id, profile.displayName, 'Updated staff profile', selected?.displayName);
    setSelected(s => ({...s,...changes}));
    setStaff(arr => arr.map(u => u.id===uid ? {...u,...changes} : u));
  };

  const filtered = staff
    .filter(u =>
      u.displayName?.toLowerCase().includes(search.toLowerCase()) ||
      u.robloxUsername?.toLowerCase().includes(search.toLowerCase())
    )
    .sort((a,b) => {
      // Sort by chain of command (rank sortOrder), then alphabetically within same rank
      const aRank = ranks.find(r=>r.id===a.rankId);
      const bRank = ranks.find(r=>r.id===b.rankId);
      const aOrder = aRank ? (aRank.sortOrder??aRank.tier??999) : 999;
      const bOrder = bRank ? (bRank.sortOrder??bRank.tier??999) : 999;
      if (aOrder !== bOrder) return aOrder - bOrder;
      return (a.displayName||'').localeCompare(b.displayName||'');
    });

  return (
    <div className="grid-2col">
      <div className="panel" style={{gridColumn: selected ? '1' : '1 / -1'}}>
        <div className="panel-header">
          <div>
            <div className="panel-title">Staff Directory</div>
            <div className="panel-subtitle">Sorted by chain of command · {filtered.length} member{filtered.length!==1?'s':''}</div>
          </div>
          <div className="search-wrap">
            <span className="search-icon"><Icon name="users" size={13}/></span>
            <input className="search-input" placeholder="Search staff..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
        <div className="table-scroll">
          <table>
            <thead><tr><th>#</th><th>Name</th><th>Roblox</th><th>Rank</th><th>Department</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="7"><div className="empty"><span className="empty-icon">👤</span><div className="empty-text">No staff found</div></div></td></tr>
              ) : filtered.map((u, i) => {
                const rank = ranks.find(r=>r.id===u.rankId);
                const statusDot = { active:'active', pending:'pending', suspended:'suspended', terminated:'terminated' }[u.status] || 'pending';
                return (
                  <tr key={u.id} className="clickable" onClick={()=>setSelected(u)}>
                    <td style={{color:'var(--text3)',fontSize:'11px',width:28}}>{i+1}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
                        <div className="avatar" style={{width:28,height:28,fontSize:11,flexShrink:0}}>{(u.displayName||'?')[0].toUpperCase()}</div>
                        <span style={{fontWeight:500}}>{u.displayName}</span>
                      </div>
                    </td>
                    <td style={{color:'var(--text3)',fontSize:'12px'}}>{u.robloxUsername||'—'}</td>
                    <td>
                      <span className="rank-pill">
                        <span style={{width:7,height:7,borderRadius:'50%',background:rank?.color||'#aaa',display:'inline-block',flexShrink:0}}/>
                        {u.rankName||'Unranked'}
                      </span>
                    </td>
                    <td style={{fontSize:'13px',color:'var(--text2)'}}>{u.departmentName||'—'}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
                        <span className={`status-dot ${statusDot}`}/>
                        <span style={{fontSize:'12px',color:'var(--text2)',textTransform:'capitalize'}}>{u.status}</span>
                      </div>
                    </td>
                    <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setSelected(u);}}>Edit</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {selected && (
        <div className="panel fade-in">
          <div className="panel-header">
            <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
              <div className="avatar">{(selected.displayName||'?')[0].toUpperCase()}</div>
              <div>
                <div className="panel-title">{selected.displayName}</div>
                <div className="panel-subtitle">{selected.email}</div>
              </div>
            </div>
            <button className="modal-close" onClick={()=>setSelected(null)}><Icon name="x" size={14}/></button>
          </div>
          <div className="panel-body">
            <div className="section-header">Account settings</div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-input form-select" value={selected.status} onChange={e=>updateUser(selected.id,{status:e.target.value})}>
                <option value="pending">Pending</option>
                <option value="active">Active</option>
                <option value="suspended">Suspended</option>
                <option value="terminated">Terminated</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Rank</label>
              <select className="form-input form-select" value={selected.rankId||''} onChange={e=>{
                const r = ranks.find(r=>r.id===e.target.value);
                updateUser(selected.id,{rankId:e.target.value,rankName:r?.name||'Unranked',rankTier:r?.tier||0});
              }}>
                <option value="">Unranked</option>
                {ranks.map((r,i)=><option key={r.id} value={r.id}>#{i+1} {r.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Department</label>
              <select className="form-input form-select" value={selected.departmentId||''} onChange={e=>{
                const d = departments.find(d=>d.id===e.target.value);
                updateUser(selected.id,{departmentId:e.target.value,departmentName:d?.name||'—'});
              }}>
                <option value="">No department</option>
                {departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </div>
            <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:'.3rem'}}>
              <div className="field-label">Joined</div>
              <div className="field-value" style={{fontSize:'13px'}}>{fmtDate(selected.createdAt)}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Promotions({ profile }) {

  const [ranks, setRanks] = useState([]);
  const [form, setForm] = useState({ userId:'', toRankId:'', type:'promotion', reason:'' });

  useEffect(() => {
    const unsub = db.collection('promotions').orderBy('date','desc').onSnapshot(s=>setRecords(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('users').where('status','==','active').get().then(s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('ranks').orderBy('tier').get().then(s=>{const docs=s.docs.map(d=>({id:d.id,...d.data()}));docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));setRanks(docs);});
    return unsub;

  useEffect(() => {
    // Order by tier (always exists), then sort in JS by sortOrder if present
    return db.collection('ranks').orderBy('tier').onSnapshot(async s => {
      const docs = s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b) => (a.sortOrder ?? a.tier ?? 0) - (b.sortOrder ?? b.tier ?? 0));
      setRanks(docs);
      // Auto-migrate: write sortOrder to any doc that's missing it
      const needsMigration = docs.filter(d => d.sortOrder === undefined);
      if (needsMigration.length > 0) {
        const batch = db.batch();
        docs.forEach((r, i) => {
          if (r.sortOrder === undefined) {
            batch.update(db.collection('ranks').doc(r.id), { sortOrder: i });
          }
        });
        await batch.commit();
      }
    });
  }, []);

  const openNew = () => { setEditing(null); setForm({name:'',tier:ranks.length+1,color:'#0B1F4A'}); setModal(true); };
  const openEdit = (r) => { setEditing(r); setForm({name:r.name,tier:r.tier,color:r.color||'#0B1F4A'}); setModal(true); };

  const save = async () => {
    if (!form.name) return;
    setSaving(true);
    if (editing) {
      await db.collection('ranks').doc(editing.id).update(form);
      await addLog(profile.id, profile.displayName, 'Updated rank', form.name);
    } else {
      const sortOrder = ranks.length;
      await db.collection('ranks').add({ ...form, sortOrder, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      await addLog(profile.id, profile.displayName, 'Created rank', form.name);
    }
    setModal(false); setSaving(false);
  };

  const deleteRank = async (r) => {
    if (!confirm(`Delete rank "${r.name}"?`)) return;
    await db.collection('ranks').doc(r.id).delete();
    await addLog(profile.id, profile.displayName, 'Deleted rank', r.name);
  };

  const onDragStart = (e, idx) => { dragItem.current = idx; e.currentTarget.classList.add('dragging'); };
  const onDragEnter = (e, idx) => { dragOver.current = idx; e.currentTarget.classList.add('drag-over'); };
  const onDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };
  const onDragEnd = async (e) => {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.drag-row').forEach(r=>r.classList.remove('drag-over'));
    if (dragItem.current === null || dragOver.current === null || dragItem.current === dragOver.current) return;
    const reordered = [...ranks];
    const [moved] = reordered.splice(dragItem.current, 1);
    reordered.splice(dragOver.current, 0, moved);
    dragItem.current = null; dragOver.current = null;
    // Update sortOrder in Firestore
    const batch = db.batch();
    reordered.forEach((r, i) => batch.update(db.collection('ranks').doc(r.id), { sortOrder: i }));
    await batch.commit();
    await addLog(profile.id, profile.displayName, 'Reordered ranks (chain of command)');
  };

  return (
    <div className="panel">
      <div className="panel-header">
        <div>
          <span className="panel-title">Ranks — Chain of Command</span>
          <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}}>Drag rows to reorder. Top = highest command.</div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={openNew}><Icon name="plus" size={13}/> New Rank</button>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th style={{width:32}}></th><th style={{width:20}}>Color</th><th>Rank name</th><th>Tier</th><th>Position</th><th/></tr></thead>
          <tbody>
            {ranks.length===0 ? <tr><td colSpan="6"><div className="empty"><div className="empty-text">No ranks yet — create one to get started</div></div></td></tr>
              : ranks.map((r, idx) => (
                <tr key={r.id} className="drag-row"
                  draggable
                  onDragStart={e=>onDragStart(e,idx)}
                  onDragEnter={e=>onDragEnter(e,idx)}
                  onDragLeave={onDragLeave}
                  onDragEnd={onDragEnd}
                  onDragOver={e=>e.preventDefault()}
                >
                  <td><span className="drag-handle">⠿</span></td>
                  <td><span style={{background:r.color||'#aaa',width:12,height:12,borderRadius:'50%',display:'inline-block'}}/></td>
                  <td style={{fontWeight:500}}>{r.name}</td>
                  <td><span className="badge badge-navy">Tier {r.tier}</span></td>
                  <td style={{color:'var(--text3)',fontSize:'12px'}}>#{idx+1}</td>
                  <td style={{display:'flex',gap:'.4rem'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(r)}><Icon name="edit" size={12}/></button>
                    <button className="btn btn-danger btn-sm" onClick={()=>deleteRank(r)}><Icon name="trash" size={12}/></button>
                  </td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>
      {modal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-header"><span className="modal-title">{editing?'Edit Rank':'New Rank'}</span><button className="modal-close" onClick={()=>setModal(false)}><Icon name="x" size={14}/></button></div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Rank name</label>
                <input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Lead Teacher"/>
              </div>
              <div className="form-group">
                <label className="form-label">Tier (controls permissions)</label>
                <input className="form-input" type="number" min={1} max={10} value={form.tier} onChange={e=>setForm(f=>({...f,tier:parseInt(e.target.value)||1}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Color</label>
                <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
                  <input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={{width:40,height:36,border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',padding:2}}/>
                  <input className="form-input" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={{flex:1}}/>
                </div>
              </div>
              <div className="alert alert-warn" style={{fontSize:'12px'}}>
                <strong>Tier guide:</strong> Tiers 1–4 = regular staff. Tier 5 = HR staff. Tier 6+ = HR Director.
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<div className="spinner"/>:'Save'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Pending Accounts ──
function PendingAccounts({ profile }) {
  const [pending, setPending] = useState([]);
  const [ranks, setRanks] = useState([]);
  const [departments, setDepartments] = useState([]);

  useEffect(() => {
    const unsub = db.collection('users').where('status','==','pending').onSnapshot(s=>setPending(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('ranks').orderBy('tier').get().then(s=>{const docs=s.docs.map(d=>({id:d.id,...d.data()}));docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));setRanks(docs);});
    db.collection('departments').orderBy('name').get().then(s=>setDepartments(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, []);

  const approve = async (u, rankId, deptId) => {
    const rank = ranks.find(r=>r.id===rankId);
    const dept = departments.find(d=>d.id===deptId);
    await db.collection('users').doc(u.id).update({
      status:'active', rankId: rankId||null, rankName: rank?.name||'Unranked',
      rankTier: rank?.tier||1, departmentId: deptId||null, departmentName: dept?.name||'—',
      approvedBy: profile.displayName, approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    await addLog(profile.id, profile.displayName, 'Approved account', u.displayName);
  };

  const reject = async (u) => {
    if (!confirm(`Reject and delete account for ${u.displayName}?`)) return;
    await db.collection('users').doc(u.id).delete();
    await addLog(profile.id, profile.displayName, 'Rejected account', u.displayName);
  };

  return (
    <div>
      {pending.length === 0 ? (
        <div className="panel"><div className="panel-body"><div className="empty"><div className="empty-icon">✓</div><div className="empty-text">No pending accounts</div><div className="empty-sub">All caught up</div></div></div></div>
      ) : pending.map(u => (
        <PendingCard key={u.id} u={u} ranks={ranks} departments={departments} onApprove={approve} onReject={reject}/>
      ))}
    </div>
  );
}

// Greedy CSP with backtracking:
//   Hard constraints:
//     1. One teacher can only teach one class per period
//     2. Same grade can't have two different classes in the same period
//     3. Each course gets exactly one period
//   Soft constraints (ordering heuristic):
//     - Most-constrained courses scheduled first (fewest available periods)
//     - Grade distribution spread across day
//   Grade auto-detection:
//     - Looks for 9/10/11/12 in the course name
//     - Falls back to type (core → all grades, elective → all grades)

// ── Leave Requests ──
function LeaveRequests({ profile }) {
  const [requests, setRequests] = useState([]);

  const [form, setForm] = useState({ type:'sick', startDate:'', endDate:'', reason:'' });
  const [saving, setSaving] = useState(false);
  const isHR = profile.rankTier >= 5;

  useEffect(() => {
    const q = isHR
      ? db.collection('leave_requests').orderBy('createdAt','desc')
      : db.collection('leave_requests').where('userId','==',profile.id).orderBy('createdAt','desc');
    return q.onSnapshot(s => setRequests(s.docs.map(d=>({id:d.id,...d.data()}))));
  }, []);

  const submit = async () => {
    if (!form.startDate||!form.endDate) return;
    setSaving(true);
    await db.collection('leave_requests').add({
      userId: profile.id, userName: profile.displayName,
      ...form, status:'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await addLog(profile.id, profile.displayName, 'Submitted leave request', `${form.type} · ${form.startDate}`);
    setModal(false); setForm({type:'sick',startDate:'',endDate:'',reason:''}); setSaving(false);
  };

  const updateStatus = async (id, status, userName) => {
    await db.collection('leave_requests').doc(id).update({ status, reviewedBy: profile.displayName, reviewedAt: firebase.firestore.FieldValue.serverTimestamp() });

                : requests.map(r=>(
                  <tr key={r.id}>

                    <td><span className="badge badge-navy">{typeLabels[r.type]||r.type}</span></td>

    );
  }, []);

// ── Analytics ──
function Analytics({ profile }) {
  const [users, setUsers] = useState([]);
  const [attendance, setAttendance] = useState([]);
  const [discipline, setDiscipline] = useState([]);
  const [ranks, setRanks] = useState([]);

  useEffect(() => {
    db.collection('users').onSnapshot(s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('attendance').get().then(s=>setAttendance(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('disciplinary').get().then(s=>setDiscipline(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('ranks').orderBy('tier').get().then(s=>{
      const docs=s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));
      setRanks(docs);
    });
  }, []);

  const active = users.filter(u=>u.status==='active');
  const byRank = ranks.map(r=>({ name:r.name, count:active.filter(u=>u.rankId===r.id).length })).filter(r=>r.count>0);
  const maxRank = Math.max(...byRank.map(r=>r.count), 1);

  const last30 = new Date(); last30.setDate(last30.getDate()-30);
  const recentAtt = attendance.filter(a => a.date?.toDate ? a.date.toDate() > last30 : true);
  const attByUser = {};
  recentAtt.forEach(a => { attByUser[a.userId] = (attByUser[a.userId]||0)+1; });
  const topAtt = Object.entries(attByUser).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([uid,cnt])=>({
    name: users.find(u=>u.id===uid)?.displayName||'Unknown', count: cnt
  }));
  const maxAtt = Math.max(...topAtt.map(t=>t.count), 1);

  const discByType = ['verbal_warning','written_warning','suspension','termination'].map(type=>({
    name: type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
    count: discipline.filter(d=>d.type===type).length
  })).filter(d=>d.count>0);
  const maxDisc = Math.max(...discByType.map(d=>d.count), 1);

  const exportCSV = () => {
    const rows = [['Name','Rank','Department','Status','Email'],...active.map(u=>[u.displayName,u.rankName||'',u.departmentName||'',u.status,u.email])];
    const csv = rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = 'staff_roster.csv'; a.click();
  };

  return (
    <div>
      <div className="stats-grid" style={{marginBottom:'1.5rem'}}>
        <div className="stat-card"><div className="stat-icon stat-icon-navy"><Icon name="users" size={18} color="#0B1F4A"/></div><div className="stat-label">Active Staff</div><div className="stat-val">{active.length}</div></div>
        <div className="stat-card"><div className="stat-icon stat-icon-teal"><Icon name="attendance" size={18} color="#1D9E75"/></div><div className="stat-label">Attendance (30d)</div><div className="stat-val">{recentAtt.length}</div></div>
        <div className="stat-card"><div className="stat-icon stat-icon-red"><Icon name="discipline" size={18} color="#c0392b"/></div><div className="stat-label">Disciplinary</div><div className="stat-val">{discipline.length}</div></div>
        <div className="stat-card">
          <div className="stat-icon stat-icon-amber"><Icon name="download" size={18} color="#b07d00"/></div>
          <div className="stat-label">Export</div>
          <div style={{marginTop:'.5rem'}}><button className="btn btn-ghost btn-sm" onClick={exportCSV}><Icon name="download" size={12}/> CSV</button></div>
        </div>
      </div>
      <div className="analytics-2col">
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Staff by rank</div></div>
          <div className="panel-body">
            {byRank.length===0 ? <div className="empty"><div className="empty-text">No data</div></div> :
              <div className="chart-bar-wrap">
                {byRank.map(r=>(
                  <div key={r.name} className="chart-bar-row">
                    <div className="chart-bar-label">{r.name}</div>
                    <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${(r.count/maxRank)*100}%`}}/></div>
                    <div className="chart-bar-val">{r.count}</div>
                  </div>
                ))}
              </div>
            }
          </div>
        </div>
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Top attendance (last 30 days)</div></div>
          <div className="panel-body">
            {topAtt.length===0 ? <div className="empty"><div className="empty-text">No attendance data</div></div> :
              <div className="chart-bar-wrap">
                {topAtt.map(t=>(
                  <div key={t.name} className="chart-bar-row">
                    <div className="chart-bar-label">{t.name}</div>
                    <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${(t.count/maxAtt)*100}%`}}/></div>
                    <div className="chart-bar-val">{t.count}</div>
                  </div>
                ))}
              </div>
            }
          </div>
        </div>
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Disciplinary by type</div></div>
          <div className="panel-body">
            {discByType.length===0 ? <div className="empty"><div className="empty-text">No disciplinary records</div></div> :
              <div className="chart-bar-wrap">
                {discByType.map(d=>(
                  <div key={d.name} className="chart-bar-row">
                    <div className="chart-bar-label">{d.name}</div>
                    <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${(d.count/maxDisc)*100}%`,background:'linear-gradient(90deg,#c0392b,#e74c3c)'}}/></div>
                    <div className="chart-bar-val">{d.count}</div>
                  </div>
                ))}
              </div>
            }
          </div>
        </div>
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Staff status breakdown</div></div>
          <div className="panel-body">
            <div className="chart-bar-wrap">
              {['active','pending','suspended','terminated'].map(s=>{
                const cnt = users.filter(u=>u.status===s).length;
                return cnt > 0 ? (
                  <div key={s} className="chart-bar-row">
                    <div className="chart-bar-label" style={{textTransform:'capitalize'}}>{s}</div>
                    <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${(cnt/Math.max(users.length,1))*100}%`,background:s==='active'?'linear-gradient(90deg,#0f6e56,#1D9E75)':s==='pending'?'linear-gradient(90deg,#7d5a00,#f0a500)':'linear-gradient(90deg,#7a2020,#c0392b)'}}/></div>
                    <div className="chart-bar-val">{cnt}</div>
                  </div>
                ) : null;
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

      setHistory(docs.slice(1));
    });
    db.collection('users').where('status','==','active').get().then(s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
  }, []);

  const save = async () => {
    if (!form.userId||!form.reason||!form.month) return;
    setSaving(true);
    const user = users.find(u=>u.id===form.userId);
    await db.collection('eotm').add({
      userId: form.userId, userName: user?.displayName, userRank: user?.rankName||'',
      reason: form.reason, month: form.month,
      awardedBy: profile.displayName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await addLog(profile.id, profile.displayName, 'Set Employee of the Month', user?.displayName);
    setModal(false); setForm({userId:'',reason:'',month:''}); setSaving(false);
  };

  return (
    <div style={{maxWidth:640}}>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'1.25rem'}}>
        <button className="btn btn-primary" onClick={()=>setModal(true)}><Icon name="star" size={13}/> Set Employee of Month</button>
      </div>
      {eotm ? (
        <div className="eotm-card">
          <div className="eotm-label">⭐ Employee of the Month</div>
          <div className="eotm-name">{eotm.userName}</div>
          <div className="eotm-rank">{eotm.userRank} · {eotm.month}</div>
          <div className="eotm-reason">{eotm.reason}</div>
          <div style={{fontSize:'11px',color:'rgba(255,255,255,.3)',marginTop:'.6rem'}}>Awarded by {eotm.awardedBy}</div>
        </div>
      ) : (
        <div className="panel" style={{marginBottom:'1.5rem'}}><div className="panel-body"><div className="empty"><div className="empty-icon">⭐</div><div className="empty-text">No employee of the month set yet</div></div></div></div>
      )}
      {history.length > 0 && (
        <div className="panel">
          <div className="panel-header"><div className="panel-title">Previous winners</div></div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Month</th><th>Reason</th><th>Awarded by</th></tr></thead>
              <tbody>
                {history.map(h=>(
                  <tr key={h.id}>
                    <td style={{fontWeight:500}}>{h.userName}</td>
                    <td>{h.month}</td>
                    <td style={{color:'var(--text3)',fontSize:'12px',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.reason}</td>
                    <td style={{color:'var(--text3)',fontSize:'12px'}}>{h.awardedBy}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {modal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-header"><span className="modal-title">Set Employee of the Month</span><button className="modal-close" onClick={()=>setModal(false)}><Icon name="x" size={14}/></button></div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Staff member</label>
                <select className="form-input form-select" value={form.userId} onChange={e=>setForm(f=>({...f,userId:e.target.value}))}>
                  <option value="">Select staff member</option>
                  {users.map(u=><option key={u.id} value={u.id}>{u.displayName}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Month (e.g. April 2026)</label>
                <input className="form-input" value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))} placeholder="April 2026"/>
              </div>
              <div className="form-group"><label className="form-label">Reason for award</label>
                <textarea className="form-input" rows={4} value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} placeholder="Why are they employee of the month?"/>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<div className="spinner"/>:'Award'}</button>
            </div>

}


// ── Staff Roster ──
function StaffRoster({ profile }) {
  const [users, setUsers] = useState([]);
  const [ranks, setRanks] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [courses, setCourses] = useState([]);
  const [search, setSearch] = useState('');
  const [filterDept, setFilterDept] = useState('all');
  const [view, setView] = useState('rank');

  useEffect(() => {
    const unsubUsers = db.collection('users').onSnapshot(s => {
      setUsers(s.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.status==='active'));
    });
    const unsubRanks = db.collection('ranks').onSnapshot(s => {
      const docs = s.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(a.sortOrder??a.tier??0)-(b.sortOrder??b.tier??0));
      setRanks(docs);
    });
    db.collection('departments').orderBy('name').get().then(s=>setDepartments(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('courses').get().then(s=>setCourses(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{ unsubUsers(); unsubRanks(); };
  }, []);

  const teacherCourseMap = {};
  courses.forEach(c=>(c.teacherIds||[]).forEach(tid=>{if(!teacherCourseMap[tid])teacherCourseMap[tid]=[];teacherCourseMap[tid].push(c);}));

  const filtered = users.filter(u=>
    (!search||u.displayName?.toLowerCase().includes(search.toLowerCase())||u.robloxUsername?.toLowerCase().includes(search.toLowerCase())) &&
    (filterDept==='all'||u.departmentId===filterDept)
  );

  const groups = [
    ...ranks.map(r=>({...r, members:filtered.filter(u=>u.rankId===r.id)})),
    {id:'unranked',name:'Unranked',color:'#ccc',members:filtered.filter(u=>!u.rankId||!ranks.find(r=>r.id===u.rankId))}
  ].filter(g=>g.members.length>0);

  return (
    <div>
      <div className="panel" style={{marginBottom:'1rem'}}>
        <div className="panel-body" style={{display:'flex',gap:'.75rem',flexWrap:'wrap',alignItems:'center'}}>
          <input className="search-input" placeholder="Search staff..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:180}}/>
          <select className="form-input form-select" style={{width:'auto',minWidth:160}} value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
            <option value="all">All departments</option>
            {departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
          <div style={{display:'flex',gap:'.25rem'}}>
            <button onClick={()=>setView('rank')} className={`btn btn-sm ${view==='rank'?'btn-primary':'btn-ghost'}`}>By rank</button>
            <button onClick={()=>setView('dept')} className={`btn btn-sm ${view==='dept'?'btn-primary':'btn-ghost'}`}>By dept</button>
          </div>
        </div>
      </div>
      {groups.length===0 ? (
        <div className="panel"><div className="empty"><div className="empty-text">No staff found</div></div></div>
      ) : groups.map(group=>(
        <div key={group.id} className="panel" style={{marginBottom:'1rem'}}>
          <div className="panel-header">
            <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:group.color||'#ccc',display:'inline-block'}}/>
              <span className="panel-title" style={{fontSize:'14px'}}>{group.name}</span>
            </div>
            <span className="badge badge-navy">{group.members.length} member{group.members.length!==1?'s':''}</span>
          </div>
          <div className="table-scroll">
            <table>
              <thead><tr><th>Name</th><th>Roblox</th><th>Department</th><th>Courses</th><th>Joined</th></tr></thead>
              <tbody>
                {group.members.map(u=>(
                  <tr key={u.id}>
                    <td style={{fontWeight:500}}>{u.rpName||u.displayName}</td>
                    <td style={{color:'var(--text3)',fontSize:'12px'}}>{u.robloxUsername||'—'}</td>
                    <td style={{fontSize:'12px'}}>{u.departmentName||'—'}</td>
                    <td>{(teacherCourseMap[u.id]||[]).map(c=><span key={c.id} className="badge badge-teal" style={{marginRight:2,fontSize:'10px'}}>{c.name}</span>)}</td>
                    <td style={{fontSize:'12px',color:'var(--text3)'}}>{fmtDate(u.createdAt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Employment Records ──
function EmploymentRecords({ profile }) {
  const [records, setRecords] = useState([]);
  const [users, setUsers] = useState([]);
  const [modal, setModal] = useState(false);
  const [tab, setTab] = useState('terminations');
  const [form, setForm] = useState({userId:'',type:'termination',reason:'',notes:'',incidentDetails:'',internalNotes:'',blacklisted:false,blacklistReason:''});
  const [saving, setSaving] = useState(false);
  const isDirector = profile.rankTier >= 6;

  useEffect(() => {
    const unsub = db.collection('employment_records').orderBy('createdAt','desc').onSnapshot(s=>setRecords(s.docs.map(d=>({id:d.id,...d.data()}))));
    db.collection('users').onSnapshot(s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, []);

  const save = async () => {
    if (!form.userId) return;
    setSaving(true);
    const user = users.find(u=>u.id===form.userId);
    const record = {
      userId:form.userId, userName:user?.displayName||'—', userEmail:user?.email||'—', userRank:user?.rankName||'—',
      type:form.type, blacklisted:form.blacklisted, blacklistReason:form.blacklistReason||'',
      reason:form.reason, notes:form.notes, incidentDetails:form.incidentDetails, internalNotes:form.internalNotes,
      createdBy:profile.displayName, createdById:profile.id,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    await db.collection('employment_records').add(record);
    if (form.type==='termination') {
      await db.collection('users').doc(form.userId).update({status:'terminated', terminatedAt:firebase.firestore.FieldValue.serverTimestamp(), terminatedBy:profile.displayName});
    }
    await addLog(profile.id, profile.displayName, `Created ${form.type} record${form.blacklisted?' + blacklisted':''}`, user?.displayName);
    setModal(false); setForm({userId:'',type:'termination',reason:'',notes:'',incidentDetails:'',internalNotes:'',blacklisted:false,blacklistReason:''}); setSaving(false);
  };

  const filtered = records.filter(r=>{
    if(tab==='terminations') return r.type==='termination';
    if(tab==='blacklist') return r.blacklisted;
    return true;
  });

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.25rem',flexWrap:'wrap'}}>
        <div className="filter-tabs">
          {[['terminations','Terminations'],['blacklist','Blacklist'],['all','All Records']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} className={`filter-tab${tab===id?' active':''}`}>
              {label} <span style={{opacity:.6,fontSize:'11px'}}>({id==='terminations'?records.filter(r=>r.type==='termination').length:id==='blacklist'?records.filter(r=>r.blacklisted).length:records.length})</span>
            </button>
          ))}
        </div>
        <button className="btn btn-danger btn-sm" style={{marginLeft:'auto'}} onClick={()=>setModal(true)}><Icon name="plus" size={13}/> New Record</button>
      </div>

      {filtered.length===0 ? (
        <div className="panel"><div className="empty"><span className="empty-icon">📋</span><div className="empty-text">No {tab} records</div></div></div>
      ) : filtered.map(r=>(
        <div key={r.id} style={{background:'var(--white)',border:'1px solid var(--border)',borderLeft:r.blacklisted?'3px solid #c0392b':'1px solid var(--border)',borderRadius:'var(--radius)',padding:'1.25rem 1.5rem',marginBottom:'.85rem',boxShadow:'var(--shadow-sm)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.6rem',marginBottom:'.5rem',flexWrap:'wrap'}}>
            <div className="avatar" style={{width:28,height:28,fontSize:11,flexShrink:0}}>{(r.userName||'?')[0].toUpperCase()}</div>
            <span style={{fontWeight:700,fontSize:'15px',color:'var(--navy)',fontFamily:"'Playfair Display',serif"}}>{r.userName}</span>
            <span className={`badge ${r.type==='termination'?'badge-red':'badge-amber'}`} style={{textTransform:'capitalize'}}>{r.type}</span>
            {r.blacklisted && <span className="badge badge-red">🚫 Blacklisted</span>}
            <span style={{fontSize:'11px',color:'var(--text3)',marginLeft:'auto'}}>{fmtDate(r.createdAt)} · {r.createdBy}</span>
          </div>
          {r.reason && <div style={{fontSize:'13px',color:'var(--text)',marginTop:'.35rem'}}><strong>Reason:</strong> {r.reason}</div>}
          {r.incidentDetails && <div style={{fontSize:'12.5px',color:'var(--text2)',marginTop:'.25rem'}}>{r.incidentDetails}</div>}
        </div>
      ))}

      {modal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-header">
              <span className="modal-title">New Employment Record</span>
              <button className="modal-close" onClick={()=>setModal(false)}><Icon name="x" size={14}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Staff member</label>
                <select className="form-input form-select" value={form.userId} onChange={e=>setForm(f=>({...f,userId:e.target.value}))}>
                  <option value="">Select staff member</option>
                  {users.map(u=><option key={u.id} value={u.id}>{u.displayName} — {u.rankName||'Unranked'}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Record type</label>
                <select className="form-input form-select" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                  <option value="termination">Termination (removes from active staff)</option>
                  <option value="resignation">Voluntary Resignation</option>
                  <option value="suspension">Suspension</option>
                  <option value="investigation">Under Investigation</option>
                </select>
              </div>
              {form.type==='termination' && <div className="alert alert-warn" style={{fontSize:'12px'}}>⚠️ This will immediately set the staff member status to "terminated".</div>}
              <div className="form-group">
                <label className="form-label">Reason</label>
                <input className="form-input" value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} placeholder="Primary reason"/>
              </div>
              <div className="form-group">
                <label className="form-label">Incident details</label>
                <textarea className="form-input" rows={3} value={form.incidentDetails} onChange={e=>setForm(f=>({...f,incidentDetails:e.target.value}))} placeholder="Detailed description..."/>
              </div>
              <div className="form-group" style={{padding:'1rem',background:'#fff5f5',borderRadius:8,border:'1px solid #fad4d4'}}>
                <label style={{display:'flex',alignItems:'center',gap:'.6rem',cursor:'pointer',marginBottom:'.5rem'}}>
                  <input type="checkbox" checked={form.blacklisted} onChange={e=>setForm(f=>({...f,blacklisted:e.target.checked}))}/>
                  <span style={{fontWeight:600,fontSize:'13px',color:'#c0392b'}}>🚫 Add to Employment Blacklist</span>
                </label>
                {form.blacklisted && <input className="form-input" value={form.blacklistReason} onChange={e=>setForm(f=>({...f,blacklistReason:e.target.value}))} placeholder="Blacklist reason"/>}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-danger" onClick={save} disabled={saving||!form.userId}>
                {saving?<div className="spinner spinner-dark"/>:`Create ${form.type} record`}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                {job.responsibilities.map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:'.75rem',alignItems:'flex-start'}}>
                    <span style={{width:20,height:20,borderRadius:'50%',background:job.color,color:'white',fontSize:'10px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:'1px'}}>{i+1}</span>
                    <span style={{fontSize:'13.5px',color:'var(--text)',lineHeight:1.6}}>{r}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── My Schedule (all staff view) ──
function MySchedule({ profile }) {
  const [schedule, setSchedule] = useState(null);
  const [loading, setLoading] = useState(true);
  const [courses, setCourses] = useState([]);
  const [bellSchedule, setBellSchedule] = useState(BELL_SCHEDULE);

  useEffect(() => {
    db.collection('schedules').doc(profile.id).get().then(doc => {
      if (doc.exists) setSchedule(doc.data());
      setLoading(false);
    });
    db.collection('courses').get().then(s => {
      setCourses(s.docs.map(d=>({id:d.id,...d.data()})));
    });
    // Load live bell schedule from Firestore (falls back to hardcoded if not set)
    db.collection('settings').doc('bell_schedule').get().then(doc => {
      if (doc.exists && doc.data().periods?.length) setBellSchedule(doc.data().periods);
    });
  }, []);

  const myCourses = courses.filter(c=>(c.teacherIds||[]).includes(profile.id));

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'4rem'}}><div className="spinner spinner-dark"/></div>;

  return (
    <div>
      {/* Bell schedule */}
      <div style={{background:'linear-gradient(135deg,#0B1F4A,#0a2a1e)',borderRadius:'var(--radius)',padding:'1.25rem 1.5rem',marginBottom:'1.5rem'}}>
        <div style={{color:'white',fontFamily:"'Playfair Display',serif",fontSize:'16px',fontWeight:600,marginBottom:'.25rem'}}>🔔 Bell Schedule</div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:'12px',marginBottom:'1rem'}}>Real time → In-game time</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:'.5rem'}}>
          {bellSchedule.map(b=>(
            <div key={b.period} style={{background:'rgba(255,255,255,.06)',borderRadius:8,padding:'.5rem .75rem',display:'flex',alignItems:'center',gap:'.6rem',border:`1px solid ${b.color||'#ffffff33'}`}}>
              <div style={{width:4,alignSelf:'stretch',borderRadius:2,background:b.color||'#888',flexShrink:0}}/>
              <div>
                <div style={{fontSize:'11.5px',fontWeight:600,color:'white'}}>{b.period}</div>
                <div style={{fontSize:'10.5px',color:'rgba(255,255,255,.5)',marginTop:'1px'}}>{b.realStart}–{b.realEnd} real · {b.gameStart}–{b.gameEnd} in-game</div>
                {/* Show courses for this period if any */}
                {courses.filter(c=>c.period===b.period && (c.teacherIds||[]).includes(profile.id)).map(c=>(
                  <div key={c.id} style={{fontSize:'10px',color:'rgba(29,158,117,.9)',marginTop:'2px'}}>
                    📚 {c.name}{c.room ? ` · Rm ${c.room}` : ''}{(c.grades||[]).length>0?` · Gr ${c.grades.join('/')}` : ''}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* My courses */}
      {myCourses.length > 0 && (
        <div className="panel" style={{marginBottom:'1.25rem'}}>
          <div className="panel-header">
            <div><div className="panel-title">My Classes</div><div className="panel-subtitle">Courses you are assigned to teach</div></div>
            <span className="badge badge-teal">{myCourses.length} course{myCourses.length!==1?'s':''}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:'1rem',padding:'1.25rem'}}>
            {myCourses.map(c=>(
              <div key={c.id} style={{
                background:c.type==='core'?'linear-gradient(135deg,#f0f4ff,#e8eeff)':'linear-gradient(135deg,#f5f0ff,#ede8ff)',
                border:`1px solid ${c.type==='core'?'#c5d0f5':'#d5c8f5'}`,
                borderRadius:'var(--radius)',padding:'1rem 1.25rem',

                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'.5rem',marginBottom:'.5rem'}}>
                  <span style={{fontSize:'20px'}}>{c.type==='core'?'✏️':'🎨'}</span>
                  <div style={{display:'flex',gap:'.25rem',flexWrap:'wrap',justifyContent:'flex-end'}}>

                  </div>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:'15px',color:'var(--navy)',lineHeight:1.3}}>{c.name}</div>
                <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'.25rem',textTransform:'capitalize'}}>{c.type} course</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Personal schedule */}
      {!schedule ? (
        <div className="panel">
          <div className="empty"><span className="empty-icon">📅</span><div className="empty-text">No schedule assigned yet</div><div className="empty-sub">Your HR team will assign your schedule soon</div></div>

      ) : (
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'.5rem'}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:'18px',fontWeight:600,color:'var(--navy)'}}>{schedule.name||'My Daily Schedule'}</div>
